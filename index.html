<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Converge - Project Manager</title>
    <style>
        :root {
            --bg: #fcfcfc;
            --sidebar-bg: #ffffff;
            --border: #e5e5e5;
            --primary: #000000;
            --text-sub: #999999;
            --color-build: #4361ee;
            --color-elec: #f77f00;
            --color-test: #d62828;
            --color-empty: #eeeeee;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", Meiryo, sans-serif;
            margin: 0; background-color: var(--bg); display: flex; height: 100vh; color: #111; overflow: hidden;
        }

        /* サイドバー */
        .sidebar {
            width: 220px; background: var(--sidebar-bg); border-right: 1px solid var(--border);
            padding: 40px 20px; display: flex; flex-direction: column; flex-shrink: 0;
        }
        .logo { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
        .logo-sub { font-size: 10px; color: var(--text-sub); letter-spacing: 1px; margin-bottom: 40px; }
        .nav-item {
            text-decoration: none; color: var(--text-sub); font-size: 12px; font-weight: 600;
            margin-bottom: 25px; letter-spacing: 1px; cursor: pointer; transition: 0.2s;
            border-left: 3px solid transparent; padding-left: 10px;
        }
        .nav-item.active { color: var(--primary); border-left-color: var(--primary); }

        /* メインコンテンツ */
        .main { flex: 1; padding: 40px 60px; overflow-y: auto; }
        .header-title { font-size: 28px; font-weight: 700; margin-bottom: 30px; }

        .card {
            background: white; border: 1px solid var(--border); border-radius: 4px;
            padding: 30px; max-width: 850px; margin-bottom: 40px;
        }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 25px; }
        .input-group label { font-size: 10px; font-weight: bold; color: var(--text-sub); display: block; margin-bottom: 8px; }
        .input-group input { width: 100%; border: none; border-bottom: 1px solid #eee; font-size: 20px; font-weight: 500; outline: none; padding: 5px 0; }
        .input-group input:focus { border-bottom-color: var(--primary); }

        .buffer-section { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; border-top: 1px solid var(--border); padding-top: 25px; }
        .buffer-group label { font-size: 9px; font-weight: bold; color: var(--text-sub); margin-bottom: 5px; display: block; }
        .buffer-group input { background: #f9f9f9; border: 1px solid var(--border); padding: 8px; border-radius: 4px; font-size: 13px; width: 100%; box-sizing: border-box; }

        .btn { border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 13px; }
        .btn-calc { background: var(--primary); color: white; padding: 15px; width: 100%; margin-top: 25px; }
        .btn-save { background: #f1f3f5; color: var(--primary); padding: 10px 20px; }
        .btn-save:hover { background: #e9ecef; }
        .btn-excel { background: #28a745; color: white; padding: 15px; width: 100%; margin-top: 20px; }

        /* 結果表示 */
        .result-area { display: none; margin-top: 20px; }
        .details-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .detail-item { background: white; border: 1px solid var(--border); padding: 15px; border-left: 4px solid #eee; }
        .detail-item.build { border-left-color: var(--color-build); }
        .detail-item.elec { border-left-color: var(--color-elec); }
        .detail-item.test { border-left-color: var(--color-test); }
        .detail-label { font-size: 10px; font-weight: bold; color: var(--text-sub); margin-bottom: 4px; }
        .detail-val { font-size: 13px; font-weight: bold; }

        /* 可視化（円グラフ） */
        .visual-container { display: flex; align-items: center; gap: 40px; background: white; border: 1px solid var(--border); padding: 30px; border-radius: 4px; }
        .chart-wrapper { width: 200px; height: 200px; position: relative; flex-shrink: 0; }
        svg { transform: rotate(-90deg); border-radius: 50%; }
        circle { fill: none; stroke-width: 30; transition: stroke-dasharray 0.5s ease; cursor: pointer; }
        .chart-info { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none; }
        .chart-info-days { font-size: 20px; font-weight: bold; }

        /* 保存フォーム */
        .save-form { display: flex; gap: 15px; align-items: flex-end; margin-top: 30px; padding-top: 20px; border-top: 1px dashed var(--border); }
        .save-form .input-group { flex: 1; }
        .save-form .input-group input { font-size: 14px; }

        /* 保存済み一覧ページ */
        .history-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 20px; }
        .history-card { 
            background: white; border: 1px solid var(--border); padding: 20px; border-radius: 4px; 
            cursor: pointer; transition: transform 0.1s, border-color 0.2s; position: relative;
        }
        .history-card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .history-title { font-size: 16px; font-weight: bold; margin-bottom: 5px; }
        .history-subtitle { font-size: 12px; color: var(--text-sub); margin-bottom: 15px; }
        .history-timeline { font-size: 12px; font-weight: 600; display: flex; justify-content: space-between; }
        .btn-delete { position: absolute; top: 15px; right: 15px; font-size: 10px; color: #ff6b6b; border: none; background: none; cursor: pointer; }

        /* 休日設定 */
        .calendar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .month { background: white; border: 1px solid var(--border); padding: 10px; border-radius: 4px; font-size: 11px; }
        .day { padding: 4px 0; cursor: pointer; text-align: center; border-radius: 3px; }
        .day.holiday { background: #fee2e2 !important; color: #dc2626; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">Converge</div>
    <div class="logo-sub">工程・実績管理</div>
    <div style="margin-top: 40px;"></div>
    <div class="nav-item active" id="nav-calc" onclick="showPage('calc')">新規計画作成</div>
    <div class="nav-item" id="nav-history" onclick="showPage('history')">保存済み計画</div>
    <div class="nav-item" id="nav-holiday" onclick="showPage('holiday')">休日カレンダー</div>
</div>

<div class="main">
    <!-- スケジュール作成画面 -->
    <div id="page-calc">
        <h1 class="header-title">新規スケジュール作成</h1>
        <div class="card">
            <div class="input-grid">
                <div class="input-group"><label>立会予定日</label><input type="date" id="deadline" value="2026-10-28"></div>
                <div class="input-group"><label>組立 総工数 (h)</label><input type="number" id="buildHours" value="1920"></div>
                <div class="input-group"><label>組立 対応人数</label><input type="number" id="buildWorkers" value="2.5" step="0.5"></div>
                <div class="input-group"><label>試運転 総工数 (h)</label><input type="number" id="testHours" value="280"></div>
                <div class="input-group"><label>試運転 対応人数</label><input type="number" id="testWorkers" value="2.5" step="0.5"></div>
                <div class="input-group"><label>電気工事 日数</label><input type="number" id="elecDays" value="1"></div>
            </div>
            <div class="buffer-section">
                <div class="buffer-group"><label>試運転〜立会</label><input type="number" id="bufT2D" value="1"></div>
                <div class="buffer-group"><label>電工〜試運転</label><input type="number" id="bufE2T" value="10"></div>
                <div class="buffer-group"><label>組立〜電工</label><input type="number" id="bufB2E" value="0"></div>
            </div>
            <button class="btn btn-calc" onclick="calculate()">スケジュールを計算する</button>
        </div>

        <div id="result-area" class="result-area">
            <div class="details-list">
                <div class="detail-item build"><div class="detail-label">組立</div><div id="txt-build" class="detail-val">-</div></div>
                <div class="detail-item elec"><div class="detail-label">電工</div><div id="txt-elec" class="detail-val">-</div></div>
                <div class="detail-item test"><div class="detail-label">試運転</div><div id="txt-test" class="detail-val">-</div></div>
            </div>

            <div class="visual-container">
                <div class="chart-wrapper">
                    <svg width="200" height="200" id="pie-chart"></svg>
                    <div class="chart-info">
                        <div class="chart-info-days" id="total-days-val">0</div>
                        <div style="font-size: 8px; color: #999;">DAYS</div>
                    </div>
                </div>
                <div style="flex:1">
                    <div style="font-size: 11px; font-weight: bold; color: var(--text-sub); margin-bottom: 10px;">工程バランス</div>
                    <div id="chart-hover-date" style="font-size: 14px; font-weight: bold; color: var(--primary); min-height: 1.5em;"></div>
                    <button class="btn btn-excel" onclick="copyExcelData()">Excel用にコピー</button>
                </div>
            </div>

            <!-- 保存用フォーム -->
            <div class="save-form">
                <div class="input-group"><label>企業名（顧客名）</label><input type="text" id="save-company" placeholder="例：〇〇商事様"></div>
                <div class="input-group"><label>工場名（案件名）</label><input type="text" id="save-factory" placeholder="例：東京本社工場"></div>
                <button class="btn btn-save" onclick="saveCurrentProject()">この計画を保存する</button>
            </div>
        </div>
    </div>

    <!-- 保存済み一覧画面 -->
    <div id="page-history" style="display: none;">
        <h1 class="header-title">保存済み計画一覧</h1>
        <div id="history-list" class="history-grid"></div>
    </div>

    <!-- 休日設定画面 -->
    <div id="page-holiday" style="display: none;">
        <h1 class="header-title">休日カレンダー</h1>
        <div id="holiday-grid" class="calendar-grid"></div>
    </div>
</div>

<script>
    let customHolidays = new Set();
    let savedProjects = [];
    let computedData = { dayMap: [] };

    function showPage(p) {
        document.querySelectorAll('.main > div').forEach(d => d.style.display = 'none');
        document.getElementById(`page-${p}`).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(`nav-${p}`).classList.add('active');
        if(p === 'holiday') renderHolidays();
        if(p === 'history') renderHistory();
    }

    function formatDateStr(date) {
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    }

    window.onload = () => {
        const h = localStorage.getItem('press_holidays');
        if (h) customHolidays = new Set(JSON.parse(h));
        const p = localStorage.getItem('press_projects');
        if (p) savedProjects = JSON.parse(p);
    };

    function isWorkDay(date) {
        const d = date.getDay();
        return d !== 0 && d !== 6 && !customHolidays.has(formatDateStr(date));
    }

    function getPrevWorkDay(date) {
        let d = new Date(date); d.setDate(d.getDate() - 1);
        while(!isWorkDay(d)) d.setDate(d.getDate() - 1);
        return d;
    }

    function subtractDays(start, count) {
        let curr = new Date(start);
        if (count <= 1) return curr;
        let c = 1;
        while(c < count) {
            curr.setDate(curr.getDate() - 1);
            if(isWorkDay(curr)) c++;
        }
        return curr;
    }

    function calculate(loadData = null) {
        const source = loadData || {
            bHrs: parseFloat(document.getElementById('buildHours').value),
            bWkr: parseFloat(document.getElementById('buildWorkers').value),
            tHrs: parseFloat(document.getElementById('testHours').value),
            tWkr: parseFloat(document.getElementById('testWorkers').value),
            eD: parseInt(document.getElementById('elecDays').value),
            bufT: parseInt(document.getElementById('bufT2D').value),
            bufE: parseInt(document.getElementById('bufE2T').value),
            bufB: parseInt(document.getElementById('bufB2E').value),
            deadline: document.getElementById('deadline').value
        };

        const deadline = new Date(source.deadline.replace(/-/g, '/'));
        const bDays = Math.ceil(source.bHrs / (source.bWkr * 8));
        const tDays = Math.ceil(source.tHrs / (source.tWkr * 8));

        let tEnd = new Date(deadline);
        for(let i=0; i<source.bufT; i++) tEnd = getPrevWorkDay(tEnd);
        const tStart = subtractDays(tEnd, tDays);

        let eEnd = tStart;
        for(let i=0; i<source.bufE; i++) eEnd = getPrevWorkDay(eEnd);
        const eStart = subtractDays(eEnd, source.eD);

        let bEnd = eStart;
        for(let i=0; i<source.bufB; i++) bEnd = getPrevWorkDay(bEnd);
        const bStart = subtractDays(bEnd, bDays);

        const f = d => d.toLocaleDateString('ja-JP');
        document.getElementById('txt-build').innerText = `${f(bStart)} 〜 ${f(bEnd)}`;
        document.getElementById('txt-elec').innerText = `${f(eStart)} 〜 ${f(eEnd)}`;
        document.getElementById('txt-test').innerText = `${f(tStart)} 〜 ${f(tEnd)}`;
        document.getElementById('total-days-val').innerText = Math.ceil((deadline - bStart) / (1000*60*60*24));

        document.getElementById('result-area').style.display = 'block';

        drawPieChart([
            { name: '組立', days: bDays, color: 'var(--color-build)', range: `${f(bStart)}-${f(bEnd)}` },
            { name: '空き', days: source.bufB, color: 'var(--color-empty)', range: `バッファ` },
            { name: '電工', days: source.eD, color: 'var(--color-elec)', range: `${f(eStart)}-${f(eEnd)}` },
            { name: '空き', days: source.bufE, color: 'var(--color-empty)', range: `バッファ` },
            { name: '試運', days: tDays, color: 'var(--color-test)', range: `${f(tStart)}-${f(tEnd)}` },
            { name: '空き', days: source.bufT, color: 'var(--color-empty)', range: `バッファ` }
        ]);

        generateExcelData(bStart, deadline, {bS:bStart, bE:bEnd, eS:eStart, eE:eEnd, tS:tStart, tE:tEnd});

        // 保存用に現在の数値を記録
        computedData.source = source;
    }

    function drawPieChart(phases) {
        const svg = document.getElementById('pie-chart');
        svg.innerHTML = '';
        const total = phases.reduce((s, p) => s + p.days, 0);
        let offset = 0; const R = 80; const C = 2 * Math.PI * R;

        phases.forEach(p => {
            if (p.days <= 0) return;
            const ratio = p.days / total;
            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("cx", 100); circle.setAttribute("cy", 100); circle.setAttribute("r", R);
            circle.setAttribute("stroke", p.color);
            circle.setAttribute("stroke-dasharray", `${ratio * C} ${C}`);
            circle.setAttribute("stroke-dashoffset", -offset * C);
            circle.onmouseover = () => document.getElementById('chart-hover-date').innerText = `${p.name}: ${p.range}`;
            circle.onmouseout = () => document.getElementById('chart-hover-date').innerText = '';
            svg.appendChild(circle);
            offset += ratio;
        });
    }

    function generateExcelData(s, e, r) {
        let curr = new Date(s); let out = [];
        while(curr <= e) {
            let l = "";
            if(isWorkDay(curr)) {
                const cStr = formatDateStr(curr);
                if(cStr >= formatDateStr(r.bS) && cStr <= formatDateStr(r.bE)) l = "組";
                else if(cStr >= formatDateStr(r.eS) && cStr <= formatDateStr(r.eE)) l = "電";
                else if(cStr >= formatDateStr(r.tS) && cStr <= formatDateStr(r.tE)) l = "試";
                else l = "空";
            }
            out.push(l); curr.setDate(curr.getDate() + 1);
        }
        computedData.dayMap = out;
    }

    function copyExcelData() {
        navigator.clipboard.writeText(computedData.dayMap.join('\t')).then(() => alert("Excelコピー完了！"));
    }

    /* --- 保存機能 --- */
    function saveCurrentProject() {
        const company = document.getElementById('save-company').value;
        const factory = document.getElementById('save-factory').value;
        if(!company || !factory) return alert("企業名と工場名を入力してください");

        const project = {
            id: Date.now(),
            company,
            factory,
            source: computedData.source,
            timestamp: new Date().toLocaleString()
        };

        savedProjects.unshift(project);
        localStorage.setItem('press_projects', JSON.stringify(savedProjects));
        alert("計画を保存しました");
        document.getElementById('save-company').value = "";
        document.getElementById('save-factory').value = "";
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = savedProjects.length === 0 ? '<p style="color:#999">保存された計画はありません</p>' : '';
        
        savedProjects.forEach(p => {
            const card = document.createElement('div');
            card.className = 'history-card';
            card.onclick = () => {
                loadProject(p);
                showPage('calc');
            };
            card.innerHTML = `
                <button class="btn-delete" onclick="deleteProject(event, ${p.id})">削除</button>
                <div class="history-title">${p.company}</div>
                <div class="history-subtitle">${p.factory}</div>
                <div class="history-timeline">
                    <span>着工: ${p.source.deadline} (逆算前)</span>
                    <span style="color:var(--color-test)">立会: ${p.source.deadline}</span>
                </div>
            `;
            list.appendChild(card);
        });
    }

    function loadProject(p) {
        // 入力フォームを復元
        document.getElementById('deadline').value = p.source.deadline;
        document.getElementById('buildHours').value = p.source.bHrs;
        document.getElementById('buildWorkers').value = p.source.bWkr;
        document.getElementById('testHours').value = p.source.tHrs;
        document.getElementById('testWorkers').value = p.source.tWkr;
        document.getElementById('elecDays').value = p.source.eD;
        document.getElementById('bufT2D').value = p.source.bufT;
        document.getElementById('bufE2T').value = p.source.bufE;
        document.getElementById('bufB2E').value = p.source.bufB;
        // 再計算
        calculate(p.source);
    }

    function deleteProject(e, id) {
        e.stopPropagation();
        if(!confirm("この計画を削除しますか？")) return;
        savedProjects = savedProjects.filter(p => p.id !== id);
        localStorage.setItem('press_projects', JSON.stringify(savedProjects));
        renderHistory();
    }

    function renderHolidays() {
        const grid = document.getElementById('holiday-grid');
        grid.innerHTML = '';
        [2026, 2027].forEach(y => {
            for(let m=0; m<12; m++){
                const div = document.createElement('div'); div.className = 'month';
                div.innerHTML = `<div style="text-align:center; font-weight:bold; margin-bottom:8px;">${y}年 ${m+1}月</div>`;
                const days = document.createElement('div'); days.style.display = 'grid'; days.style.gridTemplateColumns = 'repeat(7, 1fr)';
                const first = new Date(y, m, 1); const last = new Date(y, m+1, 0).getDate();
                for(let i=0; i<first.getDay(); i++) days.
