<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Converge - Fluent Scheduler</title>
    <style>
        :root {
            /* Fluent 2 Color Palette */
            --f-bg: #f3f3f3;
            --f-card: #ffffff;
            --f-sidebar: rgba(255, 255, 255, 0.7);
            --f-accent: #0078d4; /* Fluent Blue */
            --f-accent-hover: #005a9e;
            --f-text: #242424;
            --f-text-sec: #616161;
            --f-border: #e0e0e0;
            --f-radius: 8px;
            --f-shadow: 0 4px 12px rgba(0,0,0,0.08);

            /* Process Colors */
            --color-build: #0078d4; /* Assembly */
            --color-elec: #d83b01;  /* Electrical */
            --color-test: #c50f1f;  /* Test Run */
            --color-empty: rgba(161, 159, 157, 0.2); /* Buffer */
        }

        body {
            font-family: 'Segoe UI Variable Display', 'Segoe UI', 'Meiryo UI', sans-serif;
            margin: 0; background-color: var(--f-bg); display: flex; height: 100vh; color: var(--f-text); overflow: hidden;
        }

        /* サイドバー - Acrylic Effect */
        .sidebar {
            width: 240px; background: var(--f-sidebar); backdrop-filter: blur(20px);
            border-right: 1px solid var(--f-border); padding: 32px 16px; display: flex; flex-direction: column; flex-shrink: 0;
        }
        .brand { padding: 0 16px; margin-bottom: 32px; }
        .logo { font-size: 20px; font-weight: 700; color: var(--f-text); letter-spacing: -0.5px; }
        .logo-sub { font-size: 11px; color: var(--f-text-sec); text-transform: uppercase; letter-spacing: 1.5px; }

        .nav-item {
            display: flex; align-items: center; padding: 12px 16px; border-radius: var(--f-radius);
            font-size: 14px; font-weight: 500; color: var(--f-text-sec); cursor: pointer;
            transition: all 0.2s ease; margin-bottom: 4px;
        }
        .nav-item:hover { background: rgba(0,0,0,0.04); color: var(--f-text); }
        .nav-item.active { background: #fff; box-shadow: var(--f-shadow); color: var(--f-accent); font-weight: 600; }

        /* メインコンテンツ */
        .main { flex: 1; padding: 32px 48px; overflow-y: auto; }
        .page-header { margin-bottom: 24px; }
        .page-header h1 { font-size: 28px; font-weight: 700; margin: 0; }
        .page-header p { font-size: 14px; color: var(--f-text-sec); margin: 4px 0 0 0; }

        /* Fluent Card */
        .card {
            background: var(--f-card); border: 1px solid var(--f-border); border-radius: 12px;
            padding: 24px; box-shadow: var(--f-shadow); margin-bottom: 24px;
        }
        .card-title { font-size: 16px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

        /* Form Layout */
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
        .input-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }

        .f-field label { font-size: 12px; font-weight: 600; color: var(--f-text-sec); display: block; margin-bottom: 6px; }
        .f-input {
            width: 100%; border: 1px solid var(--f-border); border-radius: 4px; padding: 10px 12px;
            font-size: 15px; outline: none; transition: border-color 0.2s; box-sizing: border-box;
        }
        .f-input:focus { border-color: var(--f-accent); border-width: 2px; padding: 9px 11px; }

        /* Buttons */
        .btn { border: none; border-radius: 4px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 14px; }
        .btn-primary { background: var(--f-accent); color: white; padding: 12px 24px; }
        .btn-primary:hover { background: var(--f-accent-hover); box-shadow: 0 4px 8px rgba(0,120,212,0.3); }
        .btn-success { background: #107c10; color: white; padding: 12px 24px; width: 100%; }
        .btn-secondary { background: #f3f3f3; color: #242424; padding: 8px 16px; border: 1px solid #e0e0e0; }

        /* Results Display Grid */
        .result-layout { display: grid; grid-template-columns: 320px 1fr; gap: 40px; margin-top: 32px; display: none; }
        .chart-section { text-align: center; }
        .chart-container { position: relative; width: 240px; height: 240px; margin: 0 auto; }
        .chart-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        .chart-days { font-size: 36px; font-weight: 700; color: var(--f-accent); }

        .details-section { display: flex; flex-direction: column; gap: 16px; }
        .detail-item { padding: 16px; border-radius: 8px; border-left: 4px solid var(--f-border); background: #f9f9f9; }
        .detail-item.build { border-left-color: var(--color-build); }
        .detail-item.elec { border-left-color: var(--color-elec); }
        .detail-item.test { border-left-color: var(--color-test); }
        .detail-header { font-size: 12px; font-weight: 600; color: var(--f-text-sec); margin-bottom: 4px; }
        .detail-val { font-size: 18px; font-weight: 700; }

        /* Master Board - Gantt View */
        .board-wrapper { overflow-x: auto; border-radius: 12px; border: 1px solid var(--f-border); background: var(--f-card); }
        .board-axis { display: flex; background: #fafafa; border-bottom: 1px solid var(--f-border); height: 40px; align-items: center; font-size: 11px; font-weight: 600; color: var(--f-text-sec); }
        .board-row { display: flex; border-bottom: 1px solid var(--f-border); height: 80px; align-items: center; transition: background 0.2s; cursor: pointer; }
        .board-row:hover { background: #fcfcfc; }
        .row-meta { width: 220px; padding: 16px; border-right: 1px solid var(--f-border); flex-shrink: 0; background: white; }
        .row-gantt { flex: 1; position: relative; height: 100%; display: flex; align-items: center; padding: 0 16px; min-width: 800px; }
        
        .gantt-bar { position: absolute; height: 36px; display: flex; border-radius: 6px; overflow: hidden; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .gantt-block { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; font-size: 9px; font-weight: 700; white-space: nowrap; border-right: 1px solid rgba(255,255,255,0.2); }
        .gantt-date { font-size: 8px; opacity: 0.9; }
        
        .bg-build { background: var(--color-build); }
        .bg-elec { background: var(--color-elec); }
        .bg-test { background: var(--color-test); }
        .bg-empty { background: var(--color-empty); color: #888; }

        /* Calendar */
        .cal-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 24px; }
        .cal-month { background: white; border: 1px solid var(--f-border); padding: 16px; border-radius: 8px; }
        .day { padding: 6px; cursor: pointer; text-align: center; border-radius: 4px; font-size: 13px; }
        .day.holiday { background: #fee2e2 !important; color: #dc2626; font-weight: bold; }
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="brand">
        <div class="logo">Converge</div>
        <div class="logo-sub">Project Master</div>
    </div>
    <div class="nav-item active" id="nav-calc" onclick="showPage('calc')">新規プロジェクト</div>
    <div class="nav-item" id="nav-history" onclick="showPage('history')">全体スケジュール</div>
    <div class="nav-item" id="nav-holiday" onclick="showPage('holiday')">休日カレンダー</div>
</nav>

<main class="main">
    <!-- 入力・計算画面 -->
    <div id="page-calc">
        <div class="page-header">
            <h1>新規プロジェクト</h1>
            <p>条件を入力して、最適な製造スケジュールを生成します。</p>
        </div>

        <div class="card">
            <div class="card-title">基本情報の定義</div>
            <div class="input-row">
                <div class="f-field">
                    <label>企業名（顧客名）</label>
                    <input type="text" id="compName" class="f-input" placeholder="例: 〇〇自動車製作所">
                </div>
                <div class="f-field">
                    <label>工場名（案件名）</label>
                    <input type="text" id="factName" class="f-input" placeholder="例: プレス3号機更新">
                </div>
            </div>
            
            <div class="input-grid">
                <div class="f-field"><label>立会予定日</label><input type="date" id="deadline" class="f-input" value="2026-10-28"></div>
                <div class="f-field"><label>組立：総工数 (h)</label><input type="number" id="buildHours" class="f-input" value="1920"></div>
                <div class="f-field"><label>組立：人数</label><input type="number" id="buildWorkers" class="f-input" value="2.5" step="0.5"></div>
                <div class="f-field"><label>試運転：工数 (h)</label><input type="number" id="testHours" class="f-input" value="280"></div>
                <div class="f-field"><label>試運転：人数</label><input type="number" id="testWorkers" class="f-input" value="2.5" step="0.5"></div>
                <div class="f-field"><label>電気工事日数</label><input type="number" id="elecDays" class="f-input" value="1"></div>
            </div>

            <div class="input-grid" style="margin-top:24px; padding:20px; background:#f9f9f9; border-radius:8px;">
                <div class="f-field"><label>バッファ: 試運転〜立会</label><input type="number" id="bufT2D" class="f-input" value="1"></div>
                <div class="f-field"><label>バッファ: 電工〜試運転</label><input type="number" id="bufE2T" class="f-input" value="10"></div>
                <div class="f-field"><label>バッファ: 組立〜電工</label><input type="number" id="bufB2E" class="f-input" value="0"></div>
            </div>
            
            <button class="btn btn-primary" style="margin-top:24px; width:100%;" onclick="calculate()">スケジュールを生成</button>
        </div>

        <!-- 結果表示 -->
        <div id="result-layout" class="result-layout">
            <div class="chart-section">
                <div class="card">
                    <div class="card-title">工程比率</div>
                    <div class="chart-container">
                        <svg width="240" height="240" id="pie-chart"></svg>
                        <div class="chart-label">
                            <div class="chart-days" id="total-days-val">0</div>
                            <div style="font-size:10px; color:var(--f-text-sec); font-weight:700;">TOTAL DAYS</div>
                        </div>
                    </div>
                    <div id="chart-hover-text" style="font-size:12px; font-weight:bold; margin-top:16px; color:var(--f-accent); min-height:1.5em;"></div>
                </div>
            </div>
            <div class="details-section">
                <div class="card" style="height:100%;">
                    <div class="card-title">日程詳細</div>
                    <div class="detail-item build"><div class="detail-header">組立工程期間</div><div id="txt-build" class="detail-val">-</div></div>
                    <div class="detail-item elec"><div class="detail-header">電気工事期間</div><div id="txt-elec" class="detail-val">-</div></div>
                    <div class="detail-item test"><div class="detail-header">試運転工程期間</div><div id="txt-test" class="detail-val">-</div></div>
                    
                    <button class="btn btn-success" style="margin-top:24px;" onclick="copyExcelData()">Excel貼り付け用にコピー</button>
                    <button class="btn btn-secondary" style="margin-top:12px; width:100%;" onclick="saveProject()">この計画をマスターボードに保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 全体スケジュール画面 -->
    <div id="page-history" style="display:none">
        <div class="page-header">
            <h1>全体スケジュール</h1>
            <p>すべての案件の重なりを日単位で俯瞰・管理します。</p>
        </div>
        <div class="board-wrapper">
            <div id="board-axis" class="board-axis"></div>
            <div id="history-list"></div>
        </div>
    </div>

    <!-- 休日設定 -->
    <div id="page-holiday" style="display:none">
        <div class="page-header">
            <h1>休日設定</h1>
            <p>社内の特別休日や祝日を指定して計算に反映させます。</p>
        </div>
        <div id="holiday-grid" class="cal-grid"></div>
    </div>
</main>

<script>
    let customHolidays = new Set();
    let savedProjects = [];
    let computedData = { dayMap: [], source: null };

    function showPage(p) {
        document.getElementById('page-calc').style.display = 'none';
        document.getElementById('page-history').style.display = 'none';
        document.getElementById('page-holiday').style.display = 'none';
        document.getElementById(`page-${p}`).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`nav-${p}`).classList.add('active');
        if(p === 'history') renderMasterBoard();
        if(p === 'holiday') renderHolidays();
    }

    function formatDate(date) {
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    }

    window.onload = () => {
        const h = localStorage.getItem('press_holidays');
        if (h) customHolidays = new Set(JSON.parse(h));
        const p = localStorage.getItem('press_master_fluent');
        if (p) savedProjects = JSON.parse(p);
    };

    function isWorkDay(date) {
        const d = date.getDay();
        return d !== 0 && d !== 6 && !customHolidays.has(formatDate(date));
    }

    function getPrevWorkDay(date) {
        let d = new Date(date); d.setDate(d.getDate() - 1);
        while(!isWorkDay(d)) d.setDate(d.getDate() - 1);
        return d;
    }

    function subtractWorkDays(start, count) {
        let curr = new Date(start);
        if (count <= 1) return curr;
        let c = 1;
        while(c < count) {
            curr.setDate(curr.getDate() - 1);
            if(isWorkDay(curr)) c++;
        }
        return curr;
    }

    function runLogic(s) {
        const deadline = new Date(s.deadline.replace(/-/g, '/'));
        const bDays = Math.ceil(s.bHrs / (s.bWkr * 8));
        const tDays = Math.ceil(s.tHrs / (s.tWkr * 8));
        let tEnd = new Date(deadline);
        for(let i=0; i<s.bufT; i++) tEnd = getPrevWorkDay(tEnd);
        const tStart = subtractWorkDays(tEnd, tDays);
        let eEnd = tStart;
        for(let i=0; i<s.bufE; i++) eEnd = getPrevWorkDay(eEnd);
        const eStart = subtractWorkDays(eEnd, s.eD);
        let bEnd = eStart;
        for(let i=0; i<s.bufB; i++) bEnd = getPrevWorkDay(bEnd);
        const bStart = subtractWorkDays(bEnd, bDays);
        return { bStart, bEnd, bDays, eStart, eEnd, eD:s.eD, tStart, tEnd, tDays, deadline };
    }

    function calculate() {
        const source = {
            comp: document.getElementById('compName').value,
            fact: document.getElementById('factName').value,
            deadline: document.getElementById('deadline').value,
            bHrs: parseFloat(document.getElementById('buildHours').value),
            tHrs: parseFloat(document.getElementById('testHours').value),
            eD: parseInt(document.getElementById('elecDays').value),
            bWkr: parseFloat(document.getElementById('buildWorkers').value),
            tWkr: parseFloat(document.getElementById('testWorkers').value),
            bufT: parseInt(document.getElementById('bufT2D').value),
            bufE: parseInt(document.getElementById('bufE2T').value),
            bufB: parseInt(document.getElementById('bufB2E').value)
        };
        const res = runLogic(source);
        const f = d => d.toLocaleDateString('ja-JP');
        document.getElementById('txt-build').innerText = `${f(res.bStart)} 〜 ${f(res.bEnd)}`;
        document.getElementById('txt-elec').innerText = `${f(res.eStart)} 〜 ${f(res.eEnd)}`;
        document.getElementById('txt-test').innerText = `${f(res.tStart)} 〜 ${f(res.tEnd)}`;
        document.getElementById('total-days-val').innerText = Math.ceil((res.deadline - res.bStart) / (1000*60*60*24));
        document.getElementById('result-layout').style.display = 'grid';
        drawPieChart([
            { name: '組立', days: res.bDays, color: 'var(--color-build)', range: `${f(res.bStart)}-${f(res.bEnd)}` },
            { name: '空き', days: source.bufB, color: 'var(--color-empty)', range: `バッファ` },
            { name: '電工', days: res.eD, color: 'var(--color-elec)', range: `${f(res.eStart)}-${f(res.eEnd)}` },
            { name: '空き', days: source.bufE, color: 'var(--color-empty)', range: `バッファ` },
            { name: '試運', days: res.tDays, color: 'var(--color-test)', range: `${f(res.tStart)}-${f(res.tEnd)}` },
            { name: '空き', days: source.bufT, color: 'var(--color-empty)', range: `バッファ` }
        ]);
        generateExcelData(res.bStart, res.deadline, {bS:res.bStart, bE:res.bEnd, eS:res.eStart, eE:res.eEnd, tS:res.tStart, tE:res.tEnd});
        computedData.source = source;
    }

    function drawPieChart(phases) {
        const svg = document.getElementById('pie-chart'); svg.innerHTML = '';
        const total = phases.reduce((s, p) => s + p.days, 0);
        let offset = 0; const R = 100; const C = 2 * Math.PI * R;
        phases.forEach(p => {
            if (p.days <= 0) return;
            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("cx", 120); circle.setAttribute("cy", 120); circle.setAttribute("r", R);
            circle.setAttribute("stroke", p.color);
            circle.setAttribute("stroke-dasharray", `${(p.days/total)*C} ${C}`);
            circle.setAttribute("stroke-dashoffset", -offset * C);
            circle.onmouseover = () => document.getElementById('chart-hover-text').innerText = `${p.name}: ${p.range}`;
            circle.onmouseout = () => document.getElementById('chart-hover-text').innerText = '';
            svg.appendChild(circle);
            offset += (p.days/total);
        });
    }

    function saveProject() {
        if(!computedData.source.comp || !computedData.source.fact) return alert("案件情報を入力してください");
        savedProjects.unshift({ id: Date.now(), ...computedData.source });
        localStorage.setItem('press_master_fluent', JSON.stringify(savedProjects));
        alert("全体スケジュールに保存しました");
    }

    function renderMasterBoard() {
        const list = document.getElementById('history-list'); const axis = document.getElementById('board-axis');
        list.innerHTML = ''; if (savedProjects.length === 0) return list.innerHTML = '<p style="padding:24px;">保存データなし</p>';
        const analyzed = savedProjects.map(p => ({ ...p, res: runLogic(p) }));
        const allDates = analyzed.flatMap(p => [p.res.bStart, p.res.deadline]);
        const minD = new Date(Math.min(...allDates)); const maxD = new Date(Math.max(...allDates));
        const totalDuration = maxD - minD;
        axis.innerHTML = '<div style="width:220px; flex-shrink:0; padding-left:16px;">案件 / 工場</div>';
        let curr = new Date(minD.getFullYear(), minD.getMonth(), 1);
        while(curr <= maxD) {
            const item = document.createElement('div'); item.style.flex = "1";
            item.innerText = `${curr.getFullYear()}/${curr.getMonth()+1}`; axis.appendChild(item);
            curr.setMonth(curr.getMonth() + 1);
        }
        const f = d => `${d.getMonth()+1}/${d.getDate()}`;
        analyzed.forEach(p => {
            const row = document.createElement('div'); row.className = 'board-row';
            row.onclick = () => {
                showPage('calc');
                document.getElementById('compName').value = p.comp;
                document.getElementById('factName').value = p.fact;
                document.getElementById('deadline').value = p.deadline;
                document.getElementById('buildHours').value = p.bHrs;
                document.getElementById('testHours').value = p.tHrs;
                document.getElementById('elecDays').value = p.eD;
                document.getElementById('buildWorkers').value = p.bWkr;
                document.getElementById('testWorkers').value = p.tWkr;
                document.getElementById('bufT2D').value = p.bufT;
                document.getElementById('bufE2T').value = p.bufE;
                document.getElementById('bufB2E').value = p.bufB;
                calculate();
            };
            const left = ((p.res.bStart - minD) / totalDuration) * 100;
            const wB = ((p.res.bEnd - p.res.bStart) / totalDuration) * 100;
            const wE = ((p.res.eEnd - p.res.eStart) / totalDuration) * 100;
            const wT = ((p.res.tEnd - p.res.tStart) / totalDuration) * 100;
            const gBE = ((p.res.eStart - p.res.bEnd) / totalDuration) * 100;
            const gET = ((p.res.tStart - p.res.eEnd) / totalDuration) * 100;
            row.innerHTML = `
                <div class="row-meta"><div style="font-weight:700; font-size:13px;">${p.comp}</div><div style="font-size:11px; color:var(--f-text-sec);">${p.fact}</div></div>
                <div class="row-gantt">
                    <div class="gantt-bar" style="left:${left}%; width:${100-left}%;">
                        <div class="gantt-block bg-build" style="width:${(wB/(100-left))*100}%">組立<span class="gantt-date">${f(p.res.bStart)}-${f(p.res.bEnd)}</span></div>
                        <div class="gantt-block bg-empty" style="width:${(gBE/(100-left))*100}%"></div>
                        <div class="gantt-block bg-elec" style="width:${(wE/(100-left))*100}%">電工<span class="gantt-date">${f(p.res.eStart)}</span></div>
                        <div class="gantt-block bg-empty" style="width:${(gET/(100-left))*100}%"></div>
                        <div class="gantt-block bg-test" style="width:${(wT/(100-left))*100}%">試運転<span class="gantt-date">${f(p.res.tStart)}-${f(p.res.tEnd)}</span></div>
                    </div>
                </div>`;
            list.appendChild(row);
        });
    }

    function renderHolidays() {
        const grid = document.getElementById('holiday-grid'); grid.innerHTML = '';
        [2026, 2027].forEach(y => {
            for(let m=0; m<12; m++){
                const div = document.createElement('div'); div.className='cal-month';
                div.innerHTML=`<div style="text-align:center;font-weight:700;margin-bottom:8px;">${y}年 ${m+1}月</div>`;
                const days = document.createElement('div'); days.style.display='grid'; days.style.gridTemplateColumns='repeat(7, 1fr)';
                const first = new Date(y, m, 1);
                for(let i=0; i<first.getDay(); i++) days.appendChild(document.createElement('div'));
                const last = new Date(y,m+1,0).getDate();
                for(let d=1; d<=last; d++){
                    const ds = formatDate(new Date(y,m,d));
                    const dDiv = document.createElement('div'); dDiv.className='day'+(customHolidays.has(ds)?' holiday':'');
                    dDiv.innerText=d; dDiv.onclick=()=>{
                        if(customHolidays.has(ds)) customHolidays.delete(ds); else customHolidays.add(ds);
                        localStorage.setItem('press_holidays', JSON.stringify([...customHolidays])); renderHolidays();
                    };
                    days.appendChild(dDiv);
                }
                div.appendChild(days); grid.appendChild(div);
            }
        });
    }

    function generateExcelData(s, e, r) {
        let curr = new Date(s); let out = [];
        while(curr <= e) {
            let l = ""; if(isWorkDay(curr)) {
                const cs = formatDate(curr);
                if(cs >= formatDate(r.bS) && cs <= formatDate(r.bE)) l = "組";
                else if(cs >= formatDate(r.eS) && cs <= formatDate(r.eE)) l = "電";
                else if(cs >= formatDate(r.tS) && cs <= formatDate(r.tE)) l = "試";
                else l = "空";
            }
            out.push(l); curr.setDate(curr.getDate() + 1);
        }
        computedData.dayMap = out;
    }

    function copyExcelData() {
        navigator.clipboard.writeText(computedData.dayMap.join('\t')).then(() => alert("Excelコピー完了"));
    }
</script>
