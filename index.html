<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Converge - Press Engineering Scheduler</title>
    <style>
        :root {
            --bg: #fcfcfc;
            --sidebar-bg: #ffffff;
            --primary: #000000;
            --border: #e5e5e5;
            --text-sub: #888888;
            --build: #4361ee;
            --elec: #f77f00;
            --test: #d62828;
            --empty: #eeeeee;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; background-color: var(--bg); display: flex; height: 100vh; color: #111;
        }

        /* サイドバー */
        .sidebar {
            width: 220px; background: var(--sidebar-bg); border-right: 1px solid var(--border);
            padding: 40px 20px; display: flex; flex-direction: column; flex-shrink: 0;
        }
        .logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 5px; }
        .logo-sub { font-size: 10px; color: var(--text-sub); letter-spacing: 1px; margin-bottom: 40px; }
        .nav-item {
            font-size: 12px; font-weight: 700; color: var(--text-sub); margin-bottom: 20px;
            cursor: pointer; letter-spacing: 0.5px; transition: 0.2s; border-left: 3px solid transparent; padding-left: 10px;
        }
        .nav-item.active { color: var(--primary); border-left-color: var(--primary); }
        .nav-item:hover { color: var(--primary); }

        /* メイン */
        .main { flex: 1; padding: 60px 80px; overflow-y: auto; }
        .header-title { font-size: 32px; font-weight: 800; text-align: center; margin-bottom: 10px; }
        .header-sub { font-size: 14px; color: var(--text-sub); text-align: center; margin-bottom: 50px; }

        /* 入力カード */
        .card {
            background: white; border: 1px solid var(--border); border-radius: 8px;
            padding: 40px; max-width: 850px; margin: 0 auto 40px;
        }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; }
        .input-group label { font-size: 11px; font-weight: 800; color: var(--text-sub); display: block; margin-bottom: 8px; }
        .input-group input {
            width: 100%; border: none; border-bottom: 2px solid #eee; font-size: 24px; font-weight: 600;
            padding: 5px 0; outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-bottom-color: var(--primary); }

        /* バッファ設定 */
        .buffer-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; padding: 20px; background: #fafafa; border-radius: 6px; }
        .buffer-group label { font-size: 10px; font-weight: 700; color: #aaa; margin-bottom: 5px; display: block; }
        .buffer-group input { width: 100%; border: 1px solid #ddd; padding: 8px; border-radius: 4px; font-size: 14px; }

        .btn-calc {
            width: 100%; background: var(--primary); color: white; border: none; padding: 20px;
            font-size: 16px; font-weight: 800; border-radius: 6px; cursor: pointer; margin-top: 30px;
        }

        /* 結果エリア */
        .result-area { display: none; max-width: 850px; margin: 0 auto; }
        
        /* 1. テキスト詳細を上に */
        .details-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .detail-card { background: white; border: 1px solid var(--border); padding: 20px; border-radius: 8px; border-top: 4px solid #eee; }
        .detail-card.build { border-top-color: var(--build); }
        .detail-card.elec { border-top-color: var(--elec); }
        .detail-card.test { border-top-color: var(--test); }
        .detail-label { font-size: 11px; font-weight: 800; color: var(--text-sub); margin-bottom: 5px; }
        .detail-date { font-size: 15px; font-weight: 700; }

        /* 2. ビジュアル工程表を下に */
        .gantt-container { background: white; border: 1px solid var(--border); padding: 30px; border-radius: 8px; margin-bottom: 30px; }
        .gantt-chart { display: flex; height: 50px; border-radius: 6px; overflow: hidden; margin-bottom: 10px; background: #f0f0f0; }
        .gantt-bar { height: 100%; display: flex; align-items: center; justify-content: center; color: white; font-size: 11px; font-weight: 700; position: relative; }
        .gantt-bar:hover::after {
            content: attr(data-tip); position: absolute; top: -35px; background: #333; padding: 4px 8px; border-radius: 4px; white-space: nowrap; z-index: 10;
        }
        .bar-build { background: var(--build); }
        .bar-elec { background: var(--elec); }
        .bar-test { background: var(--test); }
        .bar-empty { background: var(--empty); color: #999; }

        .btn-excel {
            background: #28a745; color: white; border: none; width: 100%; padding: 15px;
            font-size: 16px; font-weight: 800; border-radius: 6px; cursor: pointer;
        }

        /* 休日設定カレンダー */
        .calendar-page { display: none; max-width: 1000px; margin: 0 auto; }
        .calendar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .month { background: white; border: 1px solid var(--border); padding: 15px; border-radius: 8px; }
        .month-name { text-align: center; font-weight: 800; margin-bottom: 10px; font-size: 14px; }
        .days { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 12px; }
        .day { padding: 6px 0; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .day:hover { background: #f0f0f0; }
        .day.holiday { background: #ffe3e3 !important; color: #e03131; font-weight: bold; }
        .sun { color: #e03131; } .sat { color: #1971c2; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">Converge</div>
    <div class="logo-sub">PRESS SCHEDULER</div>
    <div style="margin-top: 40px;"></div>
    <div class="nav-item active" id="nav-calc" onclick="showPage('calc')">SCHEDULER</div>
    <div class="nav-item" id="nav-holiday" onclick="showPage('holiday')">HOLIDAYS SETTING</div>
</div>

<div class="main">
    <!-- 計算メイン画面 -->
    <div id="page-calc">
        <div class="header-title">Universal Scheduler</div>
        <div class="header-sub">工程逆算による製造スケジュールの見える化</div>

        <div class="card">
            <div class="input-grid">
                <div class="input-group">
                    <label>立会日 (最終期限)</label>
                    <input type="date" id="deadline">
                </div>
                <div class="input-group">
                    <label>電気工事日数 (日)</label>
                    <input type="number" id="elecDays" value="1">
                </div>
                <div class="input-group">
                    <label>組立：総工数 (h)</label>
                    <input type="number" id="buildHours" value="1920">
                </div>
                <div class="input-group">
                    <label>組立：対応人数 (名)</label>
                    <input type="number" id="buildWorkers" value="2.5" step="0.5">
                </div>
                <div class="input-group">
                    <label>試運転：総工数 (h)</label>
                    <input type="number" id="testHours" value="280">
                </div>
                <div class="input-group">
                    <label>試運転：対応人数 (名)</label>
                    <input type="number" id="testWorkers" value="2.5" step="0.5">
                </div>
            </div>

            <label style="font-size: 11px; font-weight: 800; color: var(--text-sub);">バッファ設定 (空き稼働日)</label>
            <div class="buffer-grid">
                <div class="buffer-group">
                    <label>試運転 〜 立会</label>
                    <input type="number" id="bufT2D" value="1">
                </div>
                <div class="buffer-group">
                    <label>電工 〜 試運転</label>
                    <input type="number" id="bufE2T" value="10">
                </div>
                <div class="buffer-group">
                    <label>組立 〜 電工</label>
                    <input type="number" id="bufB2E" value="0">
                </div>
            </div>

            <button class="btn-calc" onclick="calculate()">SCHEDULE GENERATE</button>
        </div>

        <!-- 結果表示エリア -->
        <div id="result-area" class="result-area">
            <!-- 1. テキスト詳細 -->
            <div class="details-grid">
                <div class="detail-card build">
                    <div class="detail-label">組立期間 (Build)</div>
                    <div class="detail-date" id="res-build-txt">-</div>
                </div>
                <div class="detail-card elec">
                    <div class="detail-label">電気工事 (Electrical)</div>
                    <div class="detail-date" id="res-elec-txt">-</div>
                </div>
                <div class="detail-card test">
                    <div class="detail-label">試運転 (Test Run)</div>
                    <div class="detail-date" id="res-test-txt">-</div>
                </div>
            </div>

            <!-- 2. ビジュアル工程表 -->
            <div class="gantt-container">
                <div style="font-size: 11px; font-weight: 800; color: #999; margin-bottom: 15px; letter-spacing: 1px;">VISUAL TIMELINE</div>
                <div class="gantt-chart" id="gantt-chart"></div>
                <div style="display: flex; justify-content: space-between; font-size: 11px; color: #aaa; font-weight: 700;">
                    <span id="start-label">-</span>
                    <span id="end-label">-</span>
                </div>
            </div>

            <button class="btn-excel" onclick="copyExcelData()">Excel貼り付け用データをコピー</button>
        </div>
    </div>

    <!-- 休日設定画面 -->
    <div id="page-holiday" class="calendar-page">
        <div class="header-title">Company Holidays</div>
        <div class="header-sub">社内休日をクリックして設定してください（自動保存されます）</div>
        <div id="calendar-grid" class="calendar-grid"></div>
    </div>
</div>

<script>
    let customHolidays = new Set();
    let computedData = { dayMap: [] };

    function showPage(page) {
        document.getElementById('page-calc').style.display = page === 'calc' ? 'block' : 'none';
        document.getElementById('page-holiday').style.display = page === 'holiday' ? 'block' : 'none';
        document.getElementById('nav-calc').classList.toggle('active', page === 'calc');
        document.getElementById('nav-holiday').classList.toggle('active', page === 'holiday');
        if(page === 'holiday') renderCalendars();
    }

    function formatDateStr(date) {
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    }

    window.onload = () => {
        const saved = localStorage.getItem('press_holidays_v4');
        if (saved) customHolidays = new Set(JSON.parse(saved));
        document.getElementById('deadline').value = "2026-10-28";
    };

    function renderCalendars() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';
        const years = [2026, 2027];
        years.forEach(year => {
            for (let m = 0; m < 12; m++) {
                const monthDiv = document.createElement('div');
                monthDiv.className = 'month';
                monthDiv.innerHTML = `<div class="month-name">${year} / ${m + 1}</div>`;
                const daysDiv = document.createElement('div');
                daysDiv.className = 'days';
                const firstDay = new Date(year, m, 1);
                const lastDay = new Date(year, m + 1, 0);
                for (let i = 0; i < firstDay.getDay(); i++) daysDiv.appendChild(document.createElement('div'));
                for (let d = 1; d <= lastDay.getDate(); d++) {
                    const dateObj = new Date(year, m, d);
                    const dateStr = formatDateStr(dateObj);
                    const dDiv = document.createElement('div');
                    dDiv.className = 'day';
                    if (dateObj.getDay() === 0) dDiv.classList.add('sun');
                    if (dateObj.getDay() === 6) dDiv.classList.add('sat');
                    if (customHolidays.has(dateStr)) dDiv.classList.add('holiday');
                    dDiv.innerText = d;
                    dDiv.onclick = () => {
                        if (customHolidays.has(dateStr)) customHolidays.delete(dateStr);
                        else customHolidays.add(dateStr);
                        localStorage.setItem('press_holidays_v4', JSON.stringify([...customHolidays]));
                        renderCalendars();
                    };
                    daysDiv.appendChild(dDiv);
                }
                monthDiv.appendChild(daysDiv);
                grid.appendChild(monthDiv);
            }
        });
    }

    function isWorkDay(date) {
        if (date.getDay() === 0 || date.getDay() === 6) return false;
        return !customHolidays.has(formatDateStr(date));
    }

    function getPrevWorkDay(date) {
        let d = new Date(date);
        d.setDate(d.getDate() - 1);
        while (!isWorkDay(d)) d.setDate(d.getDate() - 1);
        return d;
    }

    function subtractWorkDays(startDate, daysNeeded) {
        let current = new Date(startDate);
        if (daysNeeded <= 1) return current;
        let count = 1;
        while (count < daysNeeded) {
            current.setDate(current.getDate() - 1);
            if (isWorkDay(current)) count++;
        }
        return current;
    }

    function calculate() {
        const buildHrs = parseFloat(document.getElementById('buildHours').value);
        const buildWkr = parseFloat(document.getElementById('buildWorkers').value);
        const buildDays = Math.ceil(buildHrs / (buildWkr * 8));
        const testHrs = parseFloat(document.getElementById('testHours').value);
        const testWkr = parseFloat(document.getElementById('testWorkers').value);
        const testDays = Math.ceil(testHrs / (testWkr * 8));
        const elecDays = parseInt(document.getElementById('elecDays').value);
        const bT2D = parseInt(document.getElementById('bufT2D').value);
        const bE2T = parseInt(document.getElementById('bufE2T').value);
        const bB2E = parseInt(document.getElementById('bufB2E').value);

        const deadlineVal = document.getElementById('deadline').value;
        if (!deadlineVal) return alert("立会日を選択してください");
        const deadlineDate = new Date(deadlineVal.replace(/-/g, '/'));

        // 逆算
        let testEnd = new Date(deadlineDate);
        for(let i=0; i<bT2D; i++) testEnd = getPrevWorkDay(testEnd);
        const testStart = subtractWorkDays(testEnd, testDays);

        let elecEnd = testStart;
        for(let i=0; i<bE2T; i++) elecEnd = getPrevWorkDay(elecEnd);
        const elecStart = subtractWorkDays(elecEnd, elecDays);

        let buildEnd = elecStart;
        for(let i=0; i<bB2E; i++) buildEnd = getPrevWorkDay(buildEnd);
        const buildStart = subtractWorkDays(buildEnd, buildDays);

        // 表示反映
        const fmt = d => d.toLocaleDateString('ja-JP');
        document.getElementById('res-build-txt').innerText = `${fmt(buildStart)} 〜 ${fmt(buildEnd)}`;
        document.getElementById('res-elec-txt').innerText = `${fmt(elecStart)} 〜 ${fmt(elecEnd)}`;
        document.getElementById('res-test-txt').innerText = `${fmt(testStart)} 〜 ${fmt(testEnd)}`;
        document.getElementById('start-label').innerText = fmt(buildStart);
        document.getElementById('end-label').innerText = fmt(deadlineDate);

        // ガントチャート生成
        const chart = document.getElementById('gantt-chart');
        chart.innerHTML = '';
        const phases = [
            { name: '組立', days: buildDays, class: 'bar-build', tip: `組立: ${buildDays}日` },
            { name: '空', days: bB2E, class: 'bar-empty', tip: 'バッファ' },
            { name: '電工', days: elecDays, class: 'bar-elec', tip: `電工: ${elecDays}日` },
            { name: '空', days: bE2T, class: 'bar-empty', tip: 'バッファ' },
            { name: '試運', days: testDays, class: 'bar-test', tip: `試運転: ${testDays}日` },
            { name: '空', days: bT2D, class: 'bar-empty', tip: 'バッファ' }
        ];
        const total = phases.reduce((a, b) => a + b.days, 0);
        phases.forEach(p => {
            if(p.days > 0) {
                const div = document.createElement('div');
                div.className = `gantt-bar ${p.class}`;
                div.style.width = `${(p.days / total) * 100}%`;
                div.innerText = p.days > 1 ? p.name : '';
                div.setAttribute('data-tip', p.tip);
                chart.appendChild(div);
            }
        });

        document.getElementById('result-area').style.display = 'block';
        generateExcelData(buildStart, deadlineDate, { bS: buildStart, bE: buildEnd, eS: elecStart, eE: elecEnd, tS: testStart, tE: testEnd });
    }

    function generateExcelData(rangeStart, rangeEnd, r) {
        let current = new Date(rangeStart);
        let output = [];
        while (current <= rangeEnd) {
            let label = "";
            if (isWorkDay(current)) {
                const cStr = formatDateStr(current);
                if (cStr >= formatDateStr(r.bS) && cStr <= formatDateStr(r.bE)) label = "組";
                else if (cStr >= formatDateStr(r.eS) && cStr <= formatDateStr(r.eE)) label = "電";
                else if (cStr >= formatDateStr(r.tS) && cStr <= formatDateStr(r.tE)) label = "試";
                else label = "空";
            }
            output.push(label);
            current.setDate(current.getDate() + 1);
        }
        computedData.dayMap = output;
    }

    function copyExcelData() {
        navigator.clipboard.writeText(computedData.dayMap.join('\t')).then(() => alert("コピーしました！Excelに貼り付けてください。"));
    }
</script>
</body>
</html>
