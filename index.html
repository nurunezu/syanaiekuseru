<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Converge - Press Engineering Scheduler</title>
    <style>
        :root {
            --bg: #fcfcfc;
            --sidebar-bg: #ffffff;
            --primary: #000000;
            --border: #e5e5e5;
            --text-sub: #888888;
            --build: #4361ee;
            --elec: #f77f00;
            --test: #d62828;
            --empty: #f1f3f5;
        }

        /* --- 基本レイアウト --- */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; background-color: var(--bg); display: flex; height: 100vh; color: #111;
        }

        .sidebar {
            width: 220px; background: var(--sidebar-bg); border-right: 1px solid var(--border);
            padding: 40px 20px; display: flex; flex-direction: column; flex-shrink: 0;
        }

        .main { flex: 1; padding: 40px 60px; overflow-y: auto; }

        /* --- コンポーネント --- */
        .logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 5px; }
        .logo-sub { font-size: 10px; color: var(--text-sub); letter-spacing: 1px; margin-bottom: 40px; }
        
        .nav-item {
            font-size: 12px; font-weight: 700; color: var(--text-sub); margin-bottom: 20px;
            cursor: pointer; border-left: 3px solid transparent; padding-left: 10px;
        }
        .nav-item.active { color: var(--primary); border-left-color: var(--primary); }

        .card {
            background: white; border: 1px solid var(--border); border-radius: 8px;
            padding: 30px; max-width: 900px; margin: 0 auto 30px;
        }

        .input-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .input-group label { font-size: 10px; font-weight: 800; color: var(--text-sub); display: block; margin-bottom: 5px; }
        .input-group input {
            width: 100%; border: 1px solid #eee; font-size: 15px; font-weight: 600;
            padding: 10px; border-radius: 4px; box-sizing: border-box;
        }

        .buffer-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; padding: 15px; background: #fff9db; border-radius: 8px; }

        .btn-calc {
            width: 100%; background: var(--primary); color: white; border: none; padding: 18px;
            font-size: 15px; font-weight: 800; border-radius: 8px; cursor: pointer; margin-top: 20px;
        }

        /* --- 結果表示エリア --- */
        .result-area { display: none; max-width: 900px; margin: 0 auto; }
        
        .print-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .details-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .detail-box { background: white; border: 1px solid var(--border); padding: 15px; border-radius: 8px; border-top: 4px solid #ddd; }
        .detail-box.build { border-top-color: var(--build); }
        .detail-box.elec { border-top-color: var(--elec); }
        .detail-box.test { border-top-color: var(--test); }
        .detail-box h4 { margin: 0; font-size: 11px; color: var(--text-sub); }
        .detail-box div { font-size: 14px; font-weight: 700; margin-top: 5px; }

        .timeline-box { background: white; border: 1px solid var(--border); padding: 25px; border-radius: 8px; }
        .gantt-bar { display: flex; height: 60px; border-radius: 6px; overflow: hidden; border: 1px solid #eee; }
        
        .phase {
            height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; font-size: 10px; font-weight: 700; overflow: hidden;
        }
        .phase-dates { font-size: 9px; opacity: 0.9; margin-top: 2px; }
        .phase-build { background: var(--build); }
        .phase-elec { background: var(--elec); }
        .phase-test { background: var(--test); }
        .phase-empty { background: var(--empty); color: #888; }

        .action-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn-excel { flex: 1; background: #28a745; color: white; border: none; padding: 15px; font-weight: 800; border-radius: 6px; cursor: pointer; }
        .btn-print { width: 120px; background: #666; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 800; }

        /* --- 印刷用設定（印字時に適用される） --- */
        @media print {
            .sidebar, .card, .action-btns, .nav-item, button { display: none !important; }
            body { background: white; }
            .main { padding: 0; width: 100%; }
            .result-area { display: block !important; }
            .card, .detail-box, .timeline-box { border: 1px solid #ccc !important; box-shadow: none !important; }
            .gantt-bar { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }

        /* 休日設定カレンダー */
        .calendar-page { display: none; max-width: 1000px; margin: 0 auto; }
        .calendar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .month { background: white; border: 1px solid var(--border); padding: 10px; border-radius: 8px; font-size: 11px; }
        .day { padding: 4px 0; cursor: pointer; text-align: center; border-radius: 3px; }
        .day.holiday { background: #ffe3e3 !important; color: #e03131; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">Converge</div>
    <div class="logo-sub">ENGINEERING SCHEDULER</div>
    <div style="margin-top: 40px;"></div>
    <div class="nav-item active" id="nav-calc" onclick="showPage('calc')">SCHEDULER</div>
    <div class="nav-item" id="nav-holiday" onclick="showPage('holiday')">HOLIDAYS SETTING</div>
</div>

<div class="main">
    <div id="page-calc">
        <div class="card">
            <h3>Project Requirements</h3>
            <div class="input-grid">
                <div class="input-group"><label>立会日</label><input type="date" id="deadline" value="2026-10-28"></div>
                <div class="input-group"><label>組立工数(h)</label><input type="number" id="buildHours" value="1920"></div>
                <div class="input-group"><label>組立人数</label><input type="number" id="buildWorkers" value="2.5" step="0.5"></div>
                <div class="input-group"><label>試運転工数(h)</label><input type="number" id="testHours" value="280"></div>
                <div class="input-group"><label>試運転人数</label><input type="number" id="testWorkers" value="2.5" step="0.5"></div>
                <div class="input-group"><label>電工日数(日)</label><input type="number" id="elecDays" value="1"></div>
            </div>
            <div class="buffer-grid">
                <div class="input-group"><label>試運転〜立会 空き</label><input type="number" id="bufT2D" value="1"></div>
                <div class="input-group"><label>電工〜試運転 空き</label><input type="number" id="bufE2T" value="10"></div>
                <div class="input-group"><label>組立〜電工 空き</label><input type="number" id="bufB2E" value="0"></div>
            </div>
            <button class="btn-calc" onclick="calculate()">GENERATE REPORT</button>
        </div>

        <div id="result-area" class="result-area">
            <div class="print-header">
                <h2 style="margin:0; font-size:24px;">Project Schedule Report</h2>
                <span id="print-timestamp" style="font-size:12px; color:#888;"></span>
            </div>

            <div class="details-grid">
                <div class="detail-box build"><h4>組立 (Assembly)</h4><div id="txt-build">-</div></div>
                <div class="detail-box elec"><h4>電気工事 (Electrical)</h4><div id="txt-elec">-</div></div>
                <div class="detail-box test"><h4>試運転 (Test Run)</h4><div id="txt-test">-</div></div>
            </div>

            <div class="timeline-box">
                <div style="font-size:10px; font-weight:800; color:#aaa; margin-bottom:10px;">VISUAL TIMELINE</div>
                <div class="gantt-bar" id="gantt-chart"></div>
                <div style="display:flex; justify-content:space-between; margin-top:8px; font-size:10px; color:#888; font-weight:bold;">
                    <span id="label-start">START</span>
                    <span id="label-end">DEADLINE</span>
                </div>
            </div>

            <div class="action-btns">
                <button class="btn-excel" onclick="copyExcelData()">Copy for Excel</button>
                <button class="btn-print" onclick="window.print()">PRINT</button>
            </div>
        </div>
    </div>

    <div id="page-holiday" class="calendar-page">
        <h2 style="text-align:center;">Company Holidays</h2>
        <div id="calendar-grid" class="calendar-grid"></div>
    </div>
</div>

<script>
    let customHolidays = new Set();
    let computedData = { dayMap: [] };

    function showPage(p) {
        document.getElementById('page-calc').style.display = p === 'calc' ? 'block' : 'none';
        document.getElementById('page-holiday').style.display = p === 'holiday' ? 'block' : 'none';
        document.getElementById('nav-calc').classList.toggle('active', p === 'calc');
        document.getElementById('nav-holiday').classList.toggle('active', p === 'holiday');
        if(p === 'holiday') renderCalendars();
    }

    function formatDateStr(date) {
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    }

    window.onload = () => {
        const saved = localStorage.getItem('press_holidays_print');
        if (saved) customHolidays = new Set(JSON.parse(saved));
        document.getElementById('deadline').value = "2026-10-28";
    };

    function renderCalendars() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';
        [2026, 2027].forEach(year => {
            for (let m = 0; m < 12; m++) {
                const monthDiv = document.createElement('div');
                monthDiv.className = 'month';
                monthDiv.innerHTML = `<div style="text-align:center; font-weight:800; margin-bottom:8px;">${year} / ${m+1}</div>`;
                const daysDiv = document.createElement('div');
                daysDiv.style.display = 'grid'; daysDiv.style.gridTemplateColumns = 'repeat(7, 1fr)';
                const first = new Date(year, m, 1);
                const last = new Date(year, m + 1, 0);
                for (let i = 0; i < first.getDay(); i++) daysDiv.appendChild(document.createElement('div'));
                for (let d = 1; d <= last.getDate(); d++) {
                    const dateObj = new Date(year, m, d);
                    const dateStr = formatDateStr(dateObj);
                    const dDiv = document.createElement('div');
                    dDiv.className = 'day';
                    if (dateObj.getDay() === 0 || dateObj.getDay() === 6) dDiv.style.color = '#ccc';
                    if (customHolidays.has(dateStr)) dDiv.classList.add('holiday');
                    dDiv.innerText = d;
                    dDiv.onclick = () => {
                        if (customHolidays.has(dateStr)) customHolidays.delete(dateStr);
                        else customHolidays.add(dateStr);
                        localStorage.setItem('press_holidays_print', JSON.stringify([...customHolidays]));
                        renderCalendars();
                    };
                    daysDiv.appendChild(dDiv);
                }
                monthDiv.appendChild(daysDiv);
                grid.appendChild(monthDiv);
            }
        });
    }

    function isWorkDay(date) {
        if (date.getDay() === 0 || date.getDay() === 6) return false;
        return !customHolidays.has(formatDateStr(date));
    }

    function getPrevWorkDay(date) {
        let d = new Date(date);
        d.setDate(d.getDate() - 1);
        while (!isWorkDay(d)) d.setDate(d.getDate() - 1);
        return d;
    }

    function subtractWorkDays(startDate, days) {
        let current = new Date(startDate);
        if (days <= 1) return current;
        let count = 1;
        while (count < days) {
            current.setDate(current.getDate() - 1);
            if (isWorkDay(current)) count++;
        }
        return current;
    }

    function calculate() {
        const bHrs = parseFloat(document.getElementById('buildHours').value);
        const bWkr = parseFloat(document.getElementById('buildWorkers').value);
        const bDays = Math.ceil(bHrs / (bWkr * 8));
        const tHrs = parseFloat(document.getElementById('testHours').value);
        const tWkr = parseFloat(document.getElementById('testWorkers').value);
        const tDays = Math.ceil(tHrs / (tWkr * 8));
        const elecD = parseInt(document.getElementById('elecDays').value);
        const bT2D = parseInt(document.getElementById('bufT2D').value);
        const bE2T = parseInt(document.getElementById('bufE2T').value);
        const bB2E = parseInt(document.getElementById('bufB2E').value);

        const deadline = new Date(document.getElementById('deadline').value.replace(/-/g, '/'));

        // 逆算
        let tEnd = new Date(deadline);
        for(let i=0; i<bT2D; i++) tEnd = getPrevWorkDay(tEnd);
        const tStart = subtractWorkDays(testEnd = tEnd, tDays);

        let eEnd = tStart;
        for(let i=0; i<bE2T; i++) eEnd = getPrevWorkDay(eEnd);
        const eStart = subtractWorkDays(eEnd, elecD);

        let bEnd = eStart;
        for(let i=0; i<bB2E; i++) bEnd = getPrevWorkDay(bEnd);
        const bStart = subtractWorkDays(bEnd, bDays);

        // UI反映
        const f = d => d.toLocaleDateString('ja-JP', {month:'numeric', day:'numeric'});
        const fFull = d => d.toLocaleDateString('ja-JP');
        
        document.getElementById('txt-build').innerText = `${fFull(bStart)} 〜 ${fFull(bEnd)}`;
        document.getElementById('txt-elec').innerText = `${fFull(eStart)} 〜 ${fFull(eEnd)}`;
        document.getElementById('txt-test').innerText = `${fFull(tStart)} 〜 ${fFull(tEnd)}`;
        document.getElementById('label-start').innerText = `Start: ${fFull(bStart)}`;
        document.getElementById('label-end').innerText = `Deadline: ${fFull(deadline)}`;
        document.getElementById('print-timestamp').innerText = `Generated: ${new Date().toLocaleString()}`;

        // 工程バー生成
        const chart = document.getElementById('gantt-chart');
        chart.innerHTML = '';
        const phases = [
            { name: '組立', days: bDays, cls: 'phase-build', range: `${f(bStart)}-${f(bEnd)}` },
            { name: '空', days: bB2E, cls: 'phase-empty', range: '' },
            { name: '電工', days: elecD, cls: 'phase-elec', range: `${f(eStart)}-${f(eEnd)}` },
            { name: '空', days: bE2T, cls: 'phase-empty', range: '' },
            { name: '試運', days: tDays, cls: 'phase-test', range: `${f(tStart)}-${f(tEnd)}` },
            { name: '空', days: bT2D, cls: 'phase-empty', range: '' }
        ];
        const total = phases.reduce((a, b) => a + b.days, 0);
        phases.forEach(p => {
            if(p.days > 0) {
                const div = document.createElement('div');
                div.className = `phase ${p.cls}`;
                div.style.width = `${(p.days / total) * 100}%`;
                div.innerHTML = `<div>${p.name}</div><div class="phase-dates">${p.range}</div>`;
                chart.appendChild(div);
            }
        });

        document.getElementById('result-area').style.display = 'block';
        generateExcel(bStart, deadline, { bS:bStart, bE:bEnd, eS:eStart, eE:eEnd, tS:tStart, tE:tEnd });
    }

    function generateExcel(s, e, r) {
        let curr = new Date(s);
        let out = [];
        while(curr <= e) {
            let l = "";
            if(isWorkDay(curr)) {
                const cStr = formatDateStr(curr);
                if(cStr >= formatDateStr(r.bS) && cStr <= formatDateStr(r.bE)) l = "組";
                else if(cStr >= formatDateStr(r.eS) && cStr <= formatDateStr(r.eE)) l = "電";
                else if(cStr >= formatDateStr(r.tS) && cStr <= formatDateStr(r.tE)) l = "試";
                else l = "空";
            }
            out.push(l);
            curr.setDate(curr.getDate() + 1);
        }
        computedData.dayMap = out;
    }

    function copyExcelData() {
        navigator.clipboard.writeText(computedData.dayMap.join('\t')).then(() => alert("Excel用データをコピーしました。"));
    }
</script>
</body>
</html>
