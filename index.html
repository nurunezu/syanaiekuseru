<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Converge - Project Manager</title>
    <style>
        :root {
            --bg: #fcfcfc;
            --sidebar-bg: #ffffff;
            --border: #e5e5e5;
            --primary: #000000;
            --text-sub: #999999;
            --color-build: #4361ee;
            --color-elec: #f77f00;
            --color-test: #d62828;
            --color-empty: #eeeeee;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", Meiryo, sans-serif;
            margin: 0; background-color: var(--bg); display: flex; height: 100vh; color: #111; overflow: hidden;
        }

        /* サイドバー */
        .sidebar {
            width: 200px; background: var(--sidebar-bg); border-right: 1px solid var(--border);
            padding: 40px 20px; display: flex; flex-direction: column; flex-shrink: 0;
        }
        .logo { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
        .logo-sub { font-size: 10px; color: var(--text-sub); letter-spacing: 1px; margin-bottom: 40px; }
        
        .nav-item {
            text-decoration: none; color: var(--text-sub); font-size: 12px; font-weight: 600;
            margin-bottom: 25px; letter-spacing: 1px; cursor: pointer; transition: 0.2s;
            border-left: 2px solid transparent; padding-left: 10px; margin-left: -12px;
        }
        .nav-item.active { color: var(--primary); border-left-color: var(--primary); }

        /* メインコンテンツ */
        .main { flex: 1; padding: 40px 60px; overflow-y: auto; }
        .header-title { font-size: 32px; font-weight: 700; text-align: center; margin-bottom: 10px; }
        .header-sub { font-size: 14px; color: var(--text-sub); text-align: center; margin-bottom: 40px; }

        .card {
            background: white; border: 1px solid var(--border); border-radius: 4px;
            padding: 40px; max-width: 800px; margin: 0 auto 40px;
        }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; }
        .input-group label { font-size: 10px; font-weight: bold; color: var(--text-sub); text-transform: uppercase; display: block; margin-bottom: 8px; }
        .input-group input { width: 100%; border: none; border-bottom: 1px solid #eee; font-size: 24px; font-weight: 500; outline: none; padding: 5px 0; }
        .input-group input:focus { border-bottom-color: var(--primary); }

        .buffer-section { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; border-top: 1px solid var(--border); padding-top: 30px; margin-top: 20px; }
        .buffer-group label { font-size: 9px; font-weight: bold; color: var(--text-sub); margin-bottom: 5px; display: block; }
        .buffer-group input { background: #f9f9f9; border: 1px solid var(--border); padding: 8px; border-radius: 4px; font-size: 14px; width: 100%; box-sizing: border-box; }

        .btn-calc { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 30px; font-size: 14px; }

        /* 結果表示 */
        .result-area { display: none; max-width: 800px; margin: 0 auto; }
        .details-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .detail-item { background: white; border: 1px solid var(--border); padding: 20px; border-left: 4px solid #eee; }
        .detail-item.build { border-left-color: var(--color-build); }
        .detail-item.elec { border-left-color: var(--color-elec); }
        .detail-item.test { border-left-color: var(--color-test); }
        .detail-label { font-size: 11px; font-weight: bold; color: var(--text-sub); margin-bottom: 5px; }
        .detail-val { font-size: 14px; font-weight: bold; }

        /* 円グラフ */
        .visual-container { text-align: center; background: white; border: 1px solid var(--border); padding: 40px; border-radius: 4px; }
        .chart-wrapper { width: 300px; height: 300px; margin: 0 auto; position: relative; }
        svg { transform: rotate(-90deg); border-radius: 50%; }
        circle { fill: none; stroke-width: 40; transition: stroke-dasharray 0.5s ease; cursor: pointer; }
        .chart-info { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none; }
        .chart-info-days { font-size: 28px; font-weight: bold; }

        .legend { display: flex; justify-content: center; gap: 20px; margin-top: 30px; font-size: 12px; font-weight: bold; }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .hover-info { margin-top: 25px; font-size: 14px; font-weight: bold; color: var(--primary); min-height: 1.5em; }

        .btn-excel { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 30px; }

        /* 保存フォーム */
        .save-box { border-top: 1px dashed var(--border); margin-top: 40px; padding-top: 30px; }
        .save-grid { display: grid; grid-template-columns: 1fr 1fr 150px; gap: 20px; align-items: flex-end; }
        .btn-save { background: #f1f3f5; color: var(--primary); border: none; padding: 10px; font-weight: bold; border-radius: 4px; cursor: pointer; }

        /* 保存済みリスト */
        .history-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .history-card { background: white; border: 1px solid var(--border); padding: 20px; border-radius: 4px; cursor: pointer; position: relative; }
        .history-card:hover { border-color: var(--primary); }
        .history-company { font-size: 18px; font-weight: bold; }
        .history-factory { font-size: 12px; color: var(--text-sub); margin-bottom: 15px; }
        .btn-del { position: absolute; top: 15px; right: 15px; color: #ff6b6b; border: none; background: none; cursor: pointer; font-size: 11px; }

        /* 休日設定 */
        .calendar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .month { background: white; border: 1px solid var(--border); padding: 10px; font-size: 11px; }
        .day.holiday { background: #fee2e2 !important; color: #dc2626; font-weight: bold; }
        .day { padding: 4px 0; cursor: pointer; text-align: center; border-radius: 3px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">Converge</div>
    <div class="logo-sub">QUIET PRECISION</div>
    <div style="margin-top: 40px;"></div>
    <div class="nav-item active" id="nav-calc" onclick="showPage('calc')">スケジュール作成</div>
    <div class="nav-item" id="nav-history" onclick="showPage('history')">保存済み計画</div>
    <div class="nav-item" id="nav-holiday" onclick="showPage('holiday')">休日設定</div>
</div>

<div class="main">
    <!-- メイン計算画面 -->
    <div id="page-calc">
        <div class="header-title">Universal Scheduler</div>
        <div class="header-sub">数値を入力してスケジュールを生成します。</div>

        <div class="card">
            <div class="input-grid">
                <div class="input-group"><label>立会予定日</label><input type="date" id="deadline" value="2026-10-28"></div>
                <div class="input-group"><label>組立 総工数 (h)</label><input type="number" id="buildHours" value="1920"></div>
                <div class="input-group"><label>試運転 総工数 (h)</label><input type="number" id="testHours" value="280"></div>
                <div class="input-group"><label>電気工事 日数</label><input type="number" id="elecDays" value="1"></div>
                <div class="input-group"><label>組立 人数</label><input type="number" id="buildWorkers" value="2.5" step="0.5"></div>
                <div class="input-group"><label>試運転 人数</label><input type="number" id="testWorkers" value="2.5" step="0.5"></div>
            </div>
            <div class="buffer-section">
                <div class="buffer-group"><label>試運転〜立会 空き</label><input type="number" id="bufT2D" value="1"></div>
                <div class="buffer-group"><label>電工〜試運転 空き</label><input type="number" id="bufE2T" value="10"></div>
                <div class="buffer-group"><label>組立〜電工 空き</label><input type="number" id="bufB2E" value="0"></div>
            </div>
            <button class="btn-calc" onclick="calculate()">スケジュールを生成する</button>
        </div>

        <div id="result-area" class="result-area">
            <div class="details-list">
                <div class="detail-item build"><div class="detail-label">組立期間</div><div id="txt-build" class="detail-val">-</div></div>
                <div class="detail-item elec"><div class="detail-label">電気工事</div><div id="txt-elec" class="detail-val">-</div></div>
                <div class="detail-item test"><div class="detail-label">試運転期間</div><div id="txt-test" class="detail-val">-</div></div>
            </div>

            <div class="visual-container">
                <div class="chart-wrapper">
                    <svg width="300" height="300" id="pie-chart"></svg>
                    <div class="chart-info">
                        <div class="chart-info-title">総日数</div>
                        <div class="chart-info-days" id="total-days-val">0</div>
                    </div>
                </div>
                <div class="legend">
                    <div class="legend-item"><div class="dot" style="background: var(--color-build)"></div> 組立</div>
                    <div class="legend-item"><div class="dot" style="background: var(--color-elec)"></div> 電工</div>
                    <div class="legend-item"><div class="dot" style="background: var(--color-test)"></div> 試運転</div>
                    <div class="legend-item"><div class="dot" style="background: var(--color-empty)"></div> 空き</div>
                </div>
                <div id="chart-hover-date" class="hover-info">グラフに触れると詳細が表示されます</div>
                <button class="btn-excel" onclick="copyExcelData()">Excel用にコピーする</button>
            </div>

            <!-- 保存フォーム -->
            <div class="save-box">
                <div class="save-grid">
                    <div class="input-group"><label>企業名（顧客名）</label><input type="text" id="save-company" placeholder="〇〇商事様"></div>
                    <div class="input-group"><label>工場名（案件名）</label><input type="text" id="save-factory" placeholder="第一工場"></div>
                    <button class="btn-save" onclick="saveProject()">計画を保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 保存済み一覧画面 -->
    <div id="page-history" style="display:none">
        <div class="header-title">保存済み計画</div>
        <div id="history-list" class="history-grid"></div>
    </div>

    <!-- 休日設定画面 -->
    <div id="page-holiday" style="display:none">
        <div class="header-title">休日設定</div>
        <div id="holiday-grid" class="calendar-grid"></div>
    </div>
</div>

<script>
    let customHolidays = new Set();
    let savedProjects = [];
    let computedData = { dayMap: [], source: null };

    // 画面切り替え（リンクの修正）
    function showPage(pageId) {
        document.getElementById('page-calc').style.display = 'none';
        document.getElementById('page-history').style.display = 'none';
        document.getElementById('page-holiday').style.display = 'none';
        document.getElementById(`page-${pageId}`).style.display = 'block';

        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`nav-${pageId}`).classList.add('active');

        if(pageId === 'holiday') renderHolidays();
        if(pageId === 'history') renderHistory();
    }

    function formatDateStr(date) {
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    }

    window.onload = () => {
        const h = localStorage.getItem('press_holidays');
        if (h) customHolidays = new Set(JSON.parse(h));
        const p = localStorage.getItem('press_projects_v2');
        if (p) savedProjects = JSON.parse(p);
    };

    function isWorkDay(date) {
        const d = date.getDay();
        return d !== 0 && d !== 6 && !customHolidays.has(formatDateStr(date));
    }

    function getPrevWorkDay(date) {
        let d = new Date(date); d.setDate(d.getDate() - 1);
        while(!isWorkDay(d)) d.setDate(d.getDate() - 1);
        return d;
    }

    function subtractDays(start, count) {
        let curr = new Date(start);
        if (count <= 1) return curr;
        let c = 1;
        while(c < count) {
            curr.setDate(curr.getDate() - 1);
            if(isWorkDay(curr)) c++;
        }
        return curr;
    }

    function calculate(loadSource = null) {
        const source = loadSource || {
            deadline: document.getElementById('deadline').value,
            bHrs: parseFloat(document.getElementById('buildHours').value),
            tHrs: parseFloat(document.getElementById('testHours').value),
            eD: parseInt(document.getElementById('elecDays').value),
            bWkr: parseFloat(document.getElementById('buildWorkers').value),
            tWkr: parseFloat(document.getElementById('testWorkers').value),
            bufT: parseInt(document.getElementById('bufT2D').value),
            bufE: parseInt(document.getElementById('bufE2T').value),
            bufB: parseInt(document.getElementById('bufB2E').value)
        };

        const deadline = new Date(source.deadline.replace(/-/g, '/'));
        const bDays = Math.ceil(source.bHrs / (source.bWkr * 8));
        const tDays = Math.ceil(source.tHrs / (source.tWkr * 8));

        let tEnd = new Date(deadline);
        for(let i=0; i<source.bufT; i++) tEnd = getPrevWorkDay(tEnd);
        const tStart = subtractDays(tEnd, tDays);

        let eEnd = tStart;
        for(let i=0; i<source.bufE; i++) eEnd = getPrevWorkDay(eEnd);
        const eStart = subtractDays(eEnd, source.eD);

        let bEnd = eStart;
        for(let i=0; i<source.bufB; i++) bEnd = getPrevWorkDay(bEnd);
        const bStart = subtractDays(bEnd, bDays);

        const f = d => d.toLocaleDateString('ja-JP');
        document.getElementById('txt-build').innerText = `${f(bStart)} 〜 ${f(bEnd)}`;
        document.getElementById('txt-elec').innerText = `${f(eStart)} 〜 ${f(eEnd)}`;
        document.getElementById('txt-test').innerText = `${f(tStart)} 〜 ${f(tEnd)}`;
        document.getElementById('total-days-val').innerText = Math.ceil((deadline - bStart) / (1000*60*60*24));

        document.getElementById('result-area').style.display = 'block';

        drawPieChart([
            { name: '組立', days: bDays, color: 'var(--color-build)', range: `${f(bStart)}-${f(bEnd)}` },
            { name: '空き', days: source.bufB, color: 'var(--color-empty)', range: `バッファ` },
            { name: '電工', days: source.eD, color: 'var(--color-elec)', range: `${f(eStart)}-${f(eEnd)}` },
            { name: '空き', days: source.bufE, color: 'var(--color-empty)', range: `バッファ` },
            { name: '試運', days: tDays, color: 'var(--color-test)', range: `${f(tStart)}-${f(tEnd)}` },
            { name: '空き', days: source.bufT, color: 'var(--color-empty)', range: `バッファ` }
        ]);

        generateExcelData(bStart, deadline, {bS:bStart, bE:bEnd, eS:eStart, eE:eEnd, tS:tStart, tE:tEnd});
        computedData.source = source;
    }

    function drawPieChart(phases) {
        const svg = document.getElementById('pie-chart');
        svg.innerHTML = '';
        const total = phases.reduce((s, p) => s + p.days, 0);
        let offset = 0; const R = 120; const C = 2 * Math.PI * R;

        phases.forEach(p => {
            if (p.days <= 0) return;
            const ratio = p.days / total;
            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("cx", 150); circle.setAttribute("cy", 150); circle.setAttribute("r", R);
            circle.setAttribute("stroke", p.color);
            circle.setAttribute("stroke-dasharray", `${ratio * C} ${C}`);
            circle.setAttribute("stroke-dashoffset", -offset * C);
            circle.onmouseover = () => document.getElementById('chart-hover-date').innerText = `${p.name}: ${p.range}`;
            circle.onmouseout = () => document.getElementById('chart-hover-date').innerText = 'グラフに触れると詳細が表示されます';
            svg.appendChild(circle);
            offset += ratio;
        });
    }

    function saveProject() {
        const company = document.getElementById('save-company').value;
        const factory = document.getElementById('save-factory').value;
        if(!company || !factory) return alert("名前を入力してください");
        const p = { id: Date.now(), company, factory, source: computedData.source };
        savedProjects.unshift(p);
        localStorage.setItem('press_projects_v2', JSON.stringify(savedProjects));
        alert("保存しました");
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = savedProjects.length === 0 ? '<p>保存データはありません</p>' : '';
        savedProjects.forEach(p => {
            const div = document.createElement('div');
            div.className = 'history-card';
            div.innerHTML = `<button class="btn-del" onclick="deleteP(event, ${p.id})">削除</button>
                             <div class="history-company">${p.company}</div>
                             <div class="history-factory">${p.factory}</div>`;
            div.onclick = () => {
                showPage('calc');
                document.getElementById('deadline').value = p.source.deadline;
                document.getElementById('buildHours').value = p.source.bHrs;
                document.getElementById('testHours').value = p.source.tHrs;
                document.getElementById('elecDays').value = p.source.eD;
                document.getElementById('buildWorkers').value = p.source.bWkr;
                document.getElementById('testWorkers').value = p.source.tWkr;
                document.getElementById('bufT2D').value = p.source.bufT;
                document.getElementById('bufE2T').value = p.source.bufE;
                document.getElementById('bufB2E').value = p.source.bufB;
                calculate(p.source);
            };
            list.appendChild(div);
        });
    }

    function deleteP(e, id) {
        e.stopPropagation();
        if(!confirm("削除しますか？")) return;
        savedProjects = savedProjects.filter(p => p.id !== id);
        localStorage.setItem('press_projects_v2', JSON.stringify(savedProjects));
        renderHistory();
    }

    function renderHolidays() {
        const grid = document.getElementById('holiday-grid');
        grid.innerHTML = '';
        [2026, 2027].forEach(y => {
            for(let m=0; m<12; m++){
                const div = document.createElement('div'); div.className = 'month';
                div.innerHTML = `<div style="text-align:center;font-weight:bold;">${y}年${m+1}月</div>`;
                const days = document.createElement('div'); days.style.display='grid'; days.style.gridTemplateColumns='repeat(7, 1fr)';
                const last = new Date(y, m+1, 0).getDate();
                for(let d=1; d<=last; d++){
                    const ds = formatDateStr(new Date(y, m, d));
                    const dDiv = document.createElement('div'); dDiv.className = 'day' + (customHolidays.has(ds)?' holiday':'');
                    dDiv.innerText = d;
                    dDiv.onclick = () => {
                        if(customHolidays.has(ds)) customHolidays.delete(ds); else customHolidays.add(ds);
                        localStorage.setItem('press_holidays', JSON.stringify([...customHolidays]));
                        renderHolidays();
                    };
                    days.appendChild(dDiv);
                }
                div.appendChild(days); grid.appendChild(div);
            }
        });
    }

    function generateExcelData(s, e, r) {
        let curr = new Date(s); let out = [];
        while(curr <= e) {
            let l = ""; if(isWorkDay(curr)) {
                const cs = formatDateStr(curr);
                if(cs >= formatDateStr(r.bS) && cs <= formatDateStr(r.bE)) l = "組";
                else if(cs >= formatDateStr(r.eS) && cs <= formatDateStr(r.eE)) l = "電";
                else if(cs >= formatDateStr(r.tS) && cs <= formatDateStr(r.tE)) l = "試";
                else l = "空";
            }
            out.push(l); curr.setDate(curr.getDate() + 1);
        }
        computedData.dayMap = out;
    }

    function copyExcelData() {
        navigator.clipboard.writeText(computedData.dayMap.join('\t')).then(() => alert("コピーしました"));
    }
</script>
</body>
</html>
