<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Converge - Master Project Scheduler</title>
    <style>
        :root {
            --bg: #fcfcfc;
            --sidebar-bg: #ffffff;
            --border: #e5e5e5;
            --primary: #000000;
            --text-sub: #999999;
            --color-build: #4361ee;
            --color-elec: #f77f00;
            --color-test: #d62828;
            --color-empty: rgba(238, 238, 238, 0.6);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", Meiryo, sans-serif;
            margin: 0; background-color: var(--bg); display: flex; height: 100vh; color: #111; overflow: hidden;
        }

        /* サイドバー */
        .sidebar {
            width: 200px; background: var(--sidebar-bg); border-right: 1px solid var(--border);
            padding: 40px 20px; display: flex; flex-direction: column; flex-shrink: 0;
        }
        .logo { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
        .logo-sub { font-size: 10px; color: var(--text-sub); letter-spacing: 1px; margin-bottom: 40px; }
        .nav-item {
            text-decoration: none; color: var(--text-sub); font-size: 12px; font-weight: 600;
            margin-bottom: 25px; letter-spacing: 1px; cursor: pointer; transition: 0.2s;
            border-left: 2px solid transparent; padding-left: 10px; margin-left: -12px;
        }
        .nav-item.active { color: var(--primary); border-left-color: var(--primary); }

        /* メインエリア */
        .main { flex: 1; padding: 40px 60px; overflow-y: auto; position: relative; }
        .header-title { font-size: 28px; font-weight: 700; margin-bottom: 30px; }

        .card {
            background: white; border: 1px solid var(--border); border-radius: 4px;
            padding: 30px; max-width: 900px; margin-bottom: 40px;
        }

        /* フォーム入力 */
        .input-group { margin-bottom: 20px; }
        .input-group label { font-size: 10px; font-weight: bold; color: var(--text-sub); text-transform: uppercase; display: block; margin-bottom: 6px; }
        .input-group input { width: 100%; border: none; border-bottom: 1px solid #eee; font-size: 18px; font-weight: 500; outline: none; padding: 5px 0; box-sizing: border-box;}
        .input-group input:focus { border-bottom-color: var(--primary); }

        .input-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .buffer-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; background: #fafafa; padding: 15px; border-radius: 4px; margin-top: 10px;}

        .btn-calc { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 25px; }

        /* 結果エリア：円グラフ(左)と詳細(右) */
        .result-container { display: flex; align-items: flex-start; gap: 50px; margin-top: 40px; background: white; border: 1px solid var(--border); padding: 40px; border-radius: 4px; display: none; }
        
        .result-left { width: 240px; flex-shrink: 0; text-align: center; }
        .chart-wrapper { width: 240px; height: 240px; position: relative; }
        svg { transform: rotate(-90deg); border-radius: 50%; }
        circle { fill: none; stroke-width: 35; transition: 0.5s ease; cursor: pointer; }
        .chart-info { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none; }
        .chart-info-days { font-size: 32px; font-weight: bold; }

        .result-right { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .detail-card { margin-bottom: 15px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
        .detail-card label { font-size: 11px; font-weight: bold; color: var(--text-sub); }
        .detail-card div { font-size: 16px; font-weight: bold; margin-top: 4px; }
        
        .btn-excel { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-save { background: #eee; color: #333; border: none; padding: 10px; width: 100%; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 12px;}

        /* 全体ボード (透過ガントチャート) */
        .board-container { min-width: 1000px; background: rgba(255,255,255,0.7); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 8px; }
        .board-header { display: flex; background: rgba(0,0,0,0.02); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
        .board-row { display: flex; border-bottom: 1px solid var(--border); transition: 0.2s; cursor: pointer; height: 80px; align-items: center; }
        .board-row:hover { background: rgba(0,0,0,0.01); }
        
        .col-meta { width: 200px; padding: 15px; border-right: 1px solid var(--border); flex-shrink: 0; background: white; }
        .col-timeline { flex: 1; position: relative; height: 100%; display: flex; align-items: center; padding: 0 10px; }
        
        .gantt-bar { position: absolute; height: 40px; display: flex; border-radius: 4px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .gantt-seg { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; font-size: 8px; font-weight: bold; overflow: hidden; border-right: 1px solid rgba(255,255,255,0.2); }
        .gantt-seg-date { font-size: 7px; opacity: 0.8; }
        
        .seg-build { background: var(--color-build); }
        .seg-elec { background: var(--color-elec); }
        .seg-test { background: var(--color-test); }
        .seg-empty { background: var(--color-empty); color: #999; }

        .time-axis { display: flex; font-size: 10px; font-weight: bold; color: var(--text-sub); border-bottom: 1px solid #eee; height: 30px; align-items: center;}
        .axis-item { flex: 1; border-left: 1px solid #eee; padding-left: 5px; }

        /* 休日設定 */
        .calendar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .month { background: white; border: 1px solid var(--border); padding: 10px; border-radius: 4px; font-size: 11px; }
        .day { padding: 4px 0; cursor: pointer; text-align: center; border-radius: 3px; }
        .day.holiday { background: #fee2e2 !important; color: #dc2626; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">Converge</div>
    <div class="logo-sub">Master Scheduler</div>
    <div style="margin-top: 40px;"></div>
    <div class="nav-item active" id="nav-calc" onclick="showPage('calc')">新規プロジェクト</div>
    <div class="nav-item" id="nav-history" onclick="showPage('history')">全体スケジュール</div>
    <div class="nav-item" id="nav-holiday" onclick="showPage('holiday')">休日設定</div>
</div>

<div class="main">
    <!-- 入力画面 -->
    <div id="page-calc">
        <h1 class="header-title">新規プロジェクト作成</h1>
        <div class="card">
            <!-- 企業・工場名を一番上に移動 -->
            <div class="input-group"><label>企業名（顧客名）</label><input type="text" id="compName" placeholder="例: 〇〇自動車様"></div>
            <div class="input-group"><label>工場名（案件名）</label><input type="text" id="factName" placeholder="例: プレスライン更新"></div>

            <div class="input-grid">
                <div class="input-group"><label>立会予定日</label><input type="date" id="deadline" value="2026-10-28"></div>
                <div class="input-group"><label>組立 総工数 (h)</label><input type="number" id="buildHours" value="1920"></div>
                <div class="input-group"><label>試運転 総工数 (h)</label><input type="number" id="testHours" value="280"></div>
                <div class="input-group"><label>電気工事 日数</label><input type="number" id="elecDays" value="1"></div>
                <div class="input-group"><label>組立 人数</label><input type="number" id="buildWorkers" value="2.5" step="0.5"></div>
                <div class="input-group"><label>試運転 人数</label><input type="number" id="testWorkers" value="2.5" step="0.5"></div>
            </div>

            <div class="buffer-grid">
                <div class="input-group"><label>試運転〜立会 空き</label><input type="number" id="bufT2D" value="1"></div>
                <div class="input-group"><label>電工〜試運転 空き</label><input type="number" id="bufE2T" value="10"></div>
                <div class="input-group"><label>組立〜電工 空き</label><input type="number" id="bufB2E" value="0"></div>
            </div>
            <button class="btn-calc" onclick="calculate()">スケジュールを生成する</button>
        </div>

        <!-- 結果画面（左円グラフ、右日程詳細） -->
        <div id="result-container" class="result-container">
            <div class="result-left">
                <div class="chart-wrapper">
                    <svg width="240" height="240" id="pie-chart"></svg>
                    <div class="chart-info">
                        <div class="chart-info-days" id="total-days-val">0</div>
                        <div style="font-size: 10px; color: #999;">DAYS</div>
                    </div>
                </div>
                <div id="chart-hover-text" style="font-size:12px; font-weight:bold; margin-top:15px; color:var(--color-build); min-height:1.5em;"></div>
            </div>
            <div class="result-right">
                <div class="detail-card"><label>組立期間</label><div id="txt-build">-</div></div>
                <div class="detail-card"><label>電気工事</label><div id="txt-elec">-</div></div>
                <div class="detail-card"><label>試運転期間</label><div id="txt-test">-</div></div>
                
                <button class="btn-excel" onclick="copyExcelData()">Excel貼り付け用にコピー</button>
                <button class="btn-save" onclick="saveProject()">この計画を全体ボードに保存</button>
            </div>
        </div>
    </div>

    <!-- 全体スケジュール（透過・日次詳細） -->
    <div id="page-history" style="display:none">
        <h1 class="header-title">全体スケジュール概要</h1>
        <div class="board-container">
            <div id="board-axis" class="time-axis"></div>
            <div id="history-list"></div>
        </div>
    </div>

    <!-- 休日設定 -->
    <div id="page-holiday" style="display:none">
        <h1 class="header-title">休日カレンダー</h1>
        <div id="holiday-grid" class="calendar-grid"></div>
    </div>
</div>

<script>
    let customHolidays = new Set();
    let savedProjects = [];
    let computedData = { dayMap: [], source: null };

    function showPage(p) {
        document.getElementById('page-calc').style.display = 'none';
        document.getElementById('page-history').style.display = 'none';
        document.getElementById('page-holiday').style.display = 'none';
        document.getElementById(`page-${p}`).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`nav-${p}`).classList.add('active');
        if(p === 'history') renderMasterBoard();
        if(p === 'holiday') renderHolidays();
    }

    function formatDate(date) {
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    }

    window.onload = () => {
        const h = localStorage.getItem('press_holidays');
        if (h) customHolidays = new Set(JSON.parse(h));
        const p = localStorage.getItem('press_master_v1');
        if (p) savedProjects = JSON.parse(p);
    };

    function isWorkDay(date) {
        const d = date.getDay();
        return d !== 0 && d !== 6 && !customHolidays.has(formatDate(date));
    }

    function getPrevWorkDay(date) {
        let d = new Date(date); d.setDate(d.getDate() - 1);
        while(!isWorkDay(d)) d.setDate(d.getDate() - 1);
        return d;
    }

    function subtractWorkDays(start, count) {
        let curr = new Date(start);
        if (count <= 1) return curr;
        let c = 1;
        while(c < count) {
            curr.setDate(curr.getDate() - 1);
            if(isWorkDay(curr)) c++;
        }
        return curr;
    }

    // 計算のコア
    function runLogic(s) {
        const deadline = new Date(s.deadline.replace(/-/g, '/'));
        const bDays = Math.ceil(s.bHrs / (s.bWkr * 8));
        const tDays = Math.ceil(s.tHrs / (s.tWkr * 8));
        
        let tEnd = new Date(deadline);
        for(let i=0; i<s.bufT; i++) tEnd = getPrevWorkDay(tEnd);
        const tStart = subtractWorkDays(tEnd, tDays);

        let eEnd = tStart;
        for(let i=0; i<s.bufE; i++) eEnd = getPrevWorkDay(eEnd);
        const eStart = subtractWorkDays(eEnd, s.eD);

        let bEnd = eStart;
        for(let i=0; i<s.bufB; i++) bEnd = getPrevWorkDay(bEnd);
        const bStart = subtractWorkDays(bEnd, bDays);

        return { bStart, bEnd, bDays, eStart, eEnd, eD:s.eD, tStart, tEnd, tDays, deadline };
    }

    function calculate() {
        const source = {
            comp: document.getElementById('compName').value,
            fact: document.getElementById('factName').value,
            deadline: document.getElementById('deadline').value,
            bHrs: parseFloat(document.getElementById('buildHours').value),
            tHrs: parseFloat(document.getElementById('testHours').value),
            eD: parseInt(document.getElementById('elecDays').value),
            bWkr: parseFloat(document.getElementById('buildWorkers').value),
            tWkr: parseFloat(document.getElementById('testWorkers').value),
            bufT: parseInt(document.getElementById('bufT2D').value),
            bufE: parseInt(document.getElementById('bufE2T').value),
            bufB: parseInt(document.getElementById('bufB2E').value)
        };

        const res = runLogic(source);
        const f = d => d.toLocaleDateString('ja-JP');

        document.getElementById('txt-build').innerText = `${f(res.bStart)} 〜 ${f(res.bEnd)}`;
        document.getElementById('txt-elec').innerText = `${f(res.eStart)} 〜 ${f(res.eEnd)}`;
        document.getElementById('txt-test').innerText = `${f(res.tStart)} 〜 ${f(res.tEnd)}`;
        document.getElementById('total-days-val').innerText = Math.ceil((res.deadline - res.bStart) / (1000*60*60*24));
        
        document.getElementById('result-container').style.display = 'flex';

        drawPieChart([
            { name: '組立', days: res.bDays, color: 'var(--color-build)', range: `${f(res.bStart)}-${f(res.bEnd)}` },
            { name: '空き', days: source.bufB, color: 'var(--color-empty)', range: `バッファ` },
            { name: '電工', days: res.eD, color: 'var(--color-elec)', range: `${f(res.eStart)}-${f(res.eEnd)}` },
            { name: '空き', days: source.bufE, color: 'var(--color-empty)', range: `バッファ` },
            { name: '試運', days: res.tDays, color: 'var(--color-test)', range: `${f(res.tStart)}-${f(res.tEnd)}` },
            { name: '空き', days: source.bufT, color: 'var(--color-empty)', range: `バッファ` }
        ]);

        generateExcelData(res.bStart, res.deadline, {bS:res.bStart, bE:res.bEnd, eS:res.eStart, eE:res.eEnd, tS:res.tStart, tE:res.tEnd});
        computedData.source = source;
    }

    function drawPieChart(phases) {
        const svg = document.getElementById('pie-chart'); svg.innerHTML = '';
        const total = phases.reduce((s, p) => s + p.days, 0);
        let offset = 0; const R = 100; const C = 2 * Math.PI * R;
        phases.forEach(p => {
            if (p.days <= 0) return;
            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("cx", 120); circle.setAttribute("cy", 120); circle.setAttribute("r", R);
            circle.setAttribute("stroke", p.color);
            circle.setAttribute("stroke-dasharray", `${(p.days/total)*C} ${C}`);
            circle.setAttribute("stroke-dashoffset", -offset * C);
            circle.onmouseover = () => document.getElementById('chart-hover-text').innerText = `${p.name}: ${p.range}`;
            circle.onmouseout = () => document.getElementById('chart-hover-text').innerText = '';
            svg.appendChild(circle);
            offset += (p.days/total);
        });
    }

    function saveProject() {
        if(!computedData.source.comp || !computedData.source.fact) return alert("企業名と工場名を入力してください");
        savedProjects.unshift({ id: Date.now(), ...computedData.source });
        localStorage.setItem('press_master_v1', JSON.stringify(savedProjects));
        alert("全体スケジュールに保存しました");
    }

    function renderMasterBoard() {
        const list = document.getElementById('history-list');
        const axis = document.getElementById('board-axis');
        list.innerHTML = '';
        if (savedProjects.length === 0) return list.innerHTML = '<p style="padding:20px;">保存データなし</p>';

        const analyzed = savedProjects.map(p => ({ ...p, res: runLogic(p) }));
        const allDates = analyzed.flatMap(p => [p.res.bStart, p.res.deadline]);
        const minD = new Date(Math.min(...allDates));
        const maxD = new Date(Math.max(...allDates));
        const totalDuration = maxD - minD;

        // 軸
        axis.innerHTML = '<div style="width:200px; flex-shrink:0;">案件名 / 工場名</div>';
        let curr = new Date(minD.getFullYear(), minD.getMonth(), 1);
        while(curr <= maxD) {
            const item = document.createElement('div');
            item.className = 'axis-item'; item.innerText = `${curr.getFullYear()}/${curr.getMonth()+1}`;
            axis.appendChild(item);
            curr.setMonth(curr.getMonth() + 1);
        }

        const f = d => `${d.getMonth()+1}/${d.getDate()}`;

        analyzed.forEach(p => {
            const row = document.createElement('div');
            row.className = 'board-row';
            row.onclick = () => {
                showPage('calc');
                Object.keys(p).forEach(k => { if(document.getElementById(k)) document.getElementById(k).value = p[k]; });
                document.getElementById('compName').value = p.comp;
                document.getElementById('factName').value = p.fact;
                calculate();
            };

            const left = ((p.res.bStart - minD) / totalDuration) * 100;
            const wB = ((p.res.bEnd - p.res.bStart) / totalDuration) * 100;
            const wE = ((p.res.eEnd - p.res.eStart) / totalDuration) * 100;
            const wT = ((p.res.tEnd - p.res.tStart) / totalDuration) * 100;
            const gBE = ((p.res.eStart - p.res.bEnd) / totalDuration) * 100;
            const gET = ((p.res.tStart - p.res.eEnd) / totalDuration) * 100;

            row.innerHTML = `
                <div class="col-meta">
                    <div style="font-weight:bold; font-size:13px;">${p.comp}</div>
                    <div style="font-size:10px; color:#999;">${p.fact}</div>
                </div>
                <div class="col-timeline">
                    <div class="gantt-bar" style="left:${left}%; width:${100-left}%;">
                        <div class="gantt-seg seg-build" style="width:${(wB/(100-left))*100}%">
                            組立 <span class="gantt-seg-date">${f(p.res.bStart)}-${f(p.res.bEnd)}</span>
                        </div>
                        <div class="gantt-seg seg-empty" style="width:${(gBE/(100-left))*100}%"></div>
                        <div class="gantt-seg seg-elec" style="width:${(wE/(100-left))*100}%">
                            電 <span class="gantt-seg-date">${f(p.res.eStart)}</span>
                        </div>
                        <div class="gantt-seg seg-empty" style="width:${(gET/(100-left))*100}%"></div>
                        <div class="gantt-seg seg-test" style="width:${(wT/(100-left))*100}%">
                            試運転 <span class="gantt-seg-date">${f(p.res.tStart)}-${f(p.res.tEnd)}</span>
                        </div>
                    </div>
                </div>
            `;
            list.appendChild(row);
        });
    }

    function renderHolidays() {
        const grid = document.getElementById('holiday-grid'); grid.innerHTML = '';
        [2026, 2027].forEach(y => {
            for(let m=0; m<12; m++){
                const div = document.createElement('div'); div.className='month';
                div.innerHTML=`<div style="text-align:center;font-weight:bold;">${y}/${m+1}</div>`;
                const days = document.createElement('div'); days.style.display='grid'; days.style.gridTemplateColumns='repeat(7, 1fr)';
                const first = new Date(y, m, 1);
                for(let i=0; i<first.getDay(); i++) days.appendChild(document.createElement('div'));
                const last = new Date(y,m+1,0).getDate();
                for(let d=1; d<=last; d++){
                    const ds = formatDate(new Date(y,m,d));
                    const dDiv = document.createElement('div'); dDiv.className='day'+(customHolidays.has(ds)?' holiday':'');
                    dDiv.innerText=d; dDiv.onclick=()=>{
                        if(customHolidays.has(ds)) customHolidays.delete(ds); else customHolidays.add(ds);
                        localStorage.setItem('press_holidays', JSON.stringify([...customHolidays])); renderHolidays();
                    };
                    days.appendChild(dDiv);
                }
                div.appendChild(days); grid.appendChild(div);
            }
        });
    }

    function generateExcelData(s, e, r) {
        let curr = new Date(s); let out = [];
        while(curr <= e) {
            let l = ""; if(isWorkDay(curr)) {
                const cs = formatDate(curr);
                if(cs >= formatDate(r.bS) && cs <= formatDate(r.bE)) l = "組";
                else if(cs >= formatDate(r.eS) && cs <= formatDate(r.eE)) l = "電";
                else if(cs >= formatDate(r.tS) && cs <= formatDate(r.tE)) l = "試";
                else l = "空";
            }
            out.push(l); curr.setDate(curr.getDate() + 1);
        }
        computedData.dayMap = out;
    }

    function copyExcelData() {
        navigator.clipboard.writeText(computedData.dayMap.join('\t')).then(() => alert("コピー完了"));
    }
</script>
</body>
</html>
